<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>학교 선택 — 헤일리올라</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="page" id="page-home">
  <div class="phone">
    <div class="top-bar with-back" style="justify-content:space-between">
      <div class="top-info">
        <div class="top-school">헤일리올라 영어학원</div>
        <div class="top-title" id="greeting">안녕하세요</div>
      </div>
      <div class="top-avatar" id="avatar">?</div>
    </div>
    <div class="scroll-body">
      <div class="section-label">내 학교를 선택하세요</div>

      <div class="school-card" id="card-maesan" onclick="selectSchool('매산고','고2 · 영어Ⅰ')">
        <div class="school-icon">🏫</div>
        <div class="school-info">
          <div class="school-name">매산고등학교</div>
          <div class="school-sub">고2 · 영어Ⅰ</div>
        </div>
        <span class="badge badge-done">분석 완료</span>
      </div>

      <div class="school-card" id="card-hyocheon" onclick="selectSchool('효천고','고2 · 영어Ⅰ')">
        <div class="school-icon">🏫</div>
        <div class="school-info">
          <div class="school-name">효천고등학교</div>
          <div class="school-sub">고2 · 영어Ⅰ</div>
        </div>
        <span class="badge badge-done">분석 완료</span>
      </div>

      <div class="school-card" id="card-boksung" onclick="selectSchool('복성고','고1 · 공통영어')">
        <div class="school-icon">🏫</div>
        <div class="school-info">
          <div class="school-name">복성고등학교</div>
          <div class="school-sub">고1 · 공통영어</div>
        </div>
        <span class="badge badge-wait">준비 중</span>
      </div>

      <div class="divider"></div>
      <div class="notice">
        <div class="notice-text">내 학교가 없으면 선생님께 추가 요청하세요</div>
      </div>

      <button class="btn-main" id="btn-next" style="margin-top:14px" disabled onclick="goNext()">
        선택 완료
      </button>

      <div style="text-align:center; margin-top:16px;">
        <a onclick="logout()" style="font-size:12px; color:#888780; cursor:pointer;">
          로그아웃
        </a>
      </div>
    </div>
  </div>
</div>

<style>
.notice {
  background: #F5F8FF;
  border: 0.5px solid #D6E4FF;
  border-radius: 8px;
  padding: 9px 12px;
}
.notice-text { font-size: 11px; color: #5A7BAD; line-height: 1.5; }
</style>

<script type="module">
  import { auth, db } from './js/firebase.js';
  import { signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  let selectedSchool = '';

  // 로그인 확인
  onAuthStateChanged(auth, async (user) => {
    if (!user) {
      window.location.href = 'index.html';
      return;
    }

    const snap = await getDoc(doc(db, 'users', user.uid));
    if (!snap.exists()) {
      window.location.href = 'index.html';
      return;
    }

    const u = snap.data();
    document.getElementById('greeting').textContent = u.name + ' 학생';
    document.getElementById('avatar').textContent   = u.name?.[0] || '?';

    // 내 학교 자동 하이라이트
    const schoolMap = { '매산고': 'card-maesan', '효천고': 'card-hyocheon', '복성고': 'card-boksung' };
    if (schoolMap[u.school]) {
      const card = document.getElementById(schoolMap[u.school]);
      if (card) {
        card.classList.add('active');
        selectedSchool = u.school;
        document.getElementById('btn-next').disabled = false;
      }
    }

    localStorage.setItem('userId',     user.uid);
    localStorage.setItem('userName',   u.name);
    localStorage.setItem('userSchool', u.school);
    localStorage.setItem('userGrade',  u.grade);
  });

  // 학교 선택
  window.selectSchool = (school, sub) => {
    if (school === '복성고') return; // 준비 중
    document.querySelectorAll('.school-card').forEach(c => c.classList.remove('active'));
    const map = { '매산고': 'card-maesan', '효천고': 'card-hyocheon', '복성고': 'card-boksung' };
    document.getElementById(map[school]).classList.add('active');
    selectedSchool = school;
    document.getElementById('btn-next').disabled = false;
  };

  // 다음 화면으로
  window.goNext = () => {
    if (!selectedSchool) return;
    localStorage.setItem('selectedSchool', selectedSchool);
    window.location.href = 'range.html';
  };

  // 로그아웃
  window.logout = async () => {
    await signOut(auth);
    localStorage.clear();
    window.location.href = 'index.html';
  };
</script>

</body>
</html>
