<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>지문 선택 — 헤일리올라</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="page">
  <div class="phone">
    <div class="top-bar with-back">
      <button class="back-btn" onclick="goBack()">←</button>
      <div class="top-info">
        <div class="top-school" id="school-label">매산고등학교</div>
        <div class="top-title" id="page-title">지문 선택</div>
      </div>
    </div>

    <!-- 스텝 표시 -->
    <div style="background:#fff;padding:12px 14px 0">
      <div class="step-row">
        <div class="step">
          <div class="step-num active" id="sn1">1</div>
          <div class="step-text active" id="st1">지문 선택</div>
        </div>
        <div class="step-line"></div>
        <div class="step">
          <div class="step-num" id="sn2">2</div>
          <div class="step-text" id="st2">유형 선택</div>
        </div>
        <div class="step-line"></div>
        <div class="step">
          <div class="step-num" id="sn3">3</div>
          <div class="step-text" id="st3">문제 풀기</div>
        </div>
      </div>
    </div>

    <!-- Step 1: 지문 선택 -->
    <div class="scroll-body" id="step1">
      <div id="loading" style="text-align:center;padding:30px;font-size:13px;color:#888780">
        지문 불러오는 중...
      </div>
      <div id="passage-list"></div>
      <button class="btn-main" id="btn-step1" disabled onclick="goStep2()">
        다음 — 유형 선택
      </button>
    </div>

    <!-- Step 2: 유형 선택 -->
    <div class="scroll-body hidden" id="step2">
      <div id="selected-passage-info"
        style="background:#EBF2FF;border:0.5px solid #A8C4F5;border-radius:8px;padding:8px 12px;margin-bottom:12px;font-size:12px;color:#1A3566;">
      </div>
      <div style="font-size:11px;color:#5A7BAD;margin-bottom:10px;line-height:1.6">
        💡 유형을 하나 선택하면 2문제를 풀어요.<br>
        ⭐는 이미 다 맞힌 유형, 회차는 도전한 횟수예요.
      </div>
      <div class="section-label">선택형 유형</div>
      <div class="type-grid" id="type-grid-select"></div>
      <div class="section-label" style="margin-top:4px">서답형 유형</div>
      <div class="type-grid" id="type-grid-written"></div>
      <button class="btn-main" id="btn-step2" disabled onclick="goStep3()" style="margin-top:8px">
        문제 풀기 시작
      </button>
    </div>
  </div>
</div>

<style>
.type-card{position:relative}
.type-progress{font-size:10px;color:#5A7BAD;margin-top:3px}
.type-progress.done{color:#3B6D11;font-weight:500}
.type-card.has-questions::after{content:'';position:absolute;top:6px;right:6px;width:6px;height:6px;border-radius:50%;background:#3B6D11}
.type-card.no-questions{opacity:0.45;cursor:not-allowed}
.type-card.no-questions .type-name::after{content:' (없음)';font-size:10px;color:#E24B4A;font-weight:normal}
</style>

<script type="module">
  import { auth, db } from './js/firebase.js';
  import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const school         = localStorage.getItem('selectedSchool') || '매산고';
  const selectedRanges = JSON.parse(localStorage.getItem('selectedRanges') || '[]');
  const userId         = localStorage.getItem('userId');
  let selectedPassage  = null;
  let selectedType     = null;
  let allPassages      = [];
  let progressMap      = {};   // passageId → { typeName: {round, correct} }
  let questionMap      = {};   // passageId_typeName → 개수

  document.getElementById('school-label').textContent = school + '등학교';

  onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = 'index.html'; return; }
    await loadPassages();
  });

  // ──────────────────────────────────────
  // 지문 불러오기 (새/옛 ID 구조 모두 호환)
  // ──────────────────────────────────────
  async function loadPassages() {
    const loadingEl = document.getElementById('loading');
    const listEl    = document.getElementById('passage-list');

    try {
      const snap = await getDocs(collection(db, 'passages'));

      allPassages = [];
      snap.forEach(d => {
        const p = d.data();
        // 새 구조(schools 배열) 또는 옛 구조(school 단일) 모두 처리
        const schools = p.schools || (p.school ? [p.school] : []);
        const matchSchool = schools.includes(school) || schools.includes('전체');
        if (!matchSchool) return;
        if (selectedRanges.length > 0 && !selectedRanges.includes(p.range)) return;
        allPassages.push({ id: d.id, ...p });
      });

      loadingEl.style.display = 'none';

      if (allPassages.length === 0) {
        listEl.innerHTML = `
          <div style="text-align:center;padding:30px;font-size:13px;color:#888780;line-height:1.8">
            선택한 범위에 저장된 지문이 없어요.<br>
            <span style="font-size:11px">관리자 화면에서 지문을 먼저 추가해주세요.</span>
          </div>`;
        return;
      }

      // 범위별 그룹핑 + 번호순 정렬
      const groups = {};
      allPassages.forEach(p => {
        const label = p.range || `${p.textbook}_${p.unit}`;
        if (!groups[label]) groups[label] = [];
        groups[label].push(p);
      });
      Object.keys(groups).forEach(g => {
        groups[g].sort((a,b) => (a.num || '').localeCompare(b.num || ''));
      });

      let html = '';
      Object.entries(groups).forEach(([range, items]) => {
        html += `<div class="section-label">${rangeLabel(range)}</div>`;
        items.forEach(p => {
          const preview = p.text ? p.text.substring(0,45) + '...' : '';
          html += `
            <div class="passage-card" onclick="selectPassage(this,'${p.id}','${p.textbook} ${p.unit} ${p.num}번')">
              <div class="p-num">${p.num}</div>
              <div class="p-info">
                <div class="p-name">${p.textbook} ${p.unit} — ${p.num}번</div>
                <div class="p-sub">${preview}</div>
              </div>
            </div>`;
        });
      });
      listEl.innerHTML = html;

    } catch(e) {
      loadingEl.textContent = '지문을 불러오지 못했어요.';
      console.error(e);
    }
  }

  function rangeLabel(range) {
    if (!range) return '기타';
    return range.replace(/_/g, ' · ');
  }

  window.selectPassage = (card, id, name) => {
    document.querySelectorAll('.passage-card').forEach(c => c.classList.remove('on'));
    card.classList.add('on');
    selectedPassage = { id, name };
    document.getElementById('btn-step1').disabled = false;
  };

  // ──────────────────────────────────────
  // 학교별 유형 정의
  // ──────────────────────────────────────
  const typeData = {
    '매산고': {
      select: [
        { key:'흐름무관', name:'흐름무관', sub:'전체 흐름 파악' },
        { key:'낱말쓰임', name:'낱말쓰임', sub:'어색한 낱말' },
        { key:'글의제목', name:'글의 제목', sub:'제목 추론' },
        { key:'글의순서', name:'글의 순서', sub:'순서 배열' },
        { key:'요약빈칸', name:'요약빈칸', sub:'(A)(B) 완성' },
        { key:'문장삽입', name:'문장삽입', sub:'삽입 위치' },
        { key:'밑줄의미', name:'밑줄의미', sub:'함축 의미' },
        { key:'어법',     name:'어법',     sub:'틀린 어법' },
        { key:'빈칸추론', name:'빈칸추론', sub:'논리 추론' },
      ],
      written: [
        { key:'요지빈칸', name:'요지빈칸', sub:'(A)(B) 서술' },
        { key:'이유서술', name:'이유서술', sub:'국문 서술' },
        { key:'밑줄의미영작', name:'밑줄영작', sub:'조건 영작' },
      ]
    },
    '효천고': {
      select: [
        { key:'어법',     name:'어법',     sub:'틀린 어법' },
        { key:'빈칸추론', name:'빈칸추론', sub:'논리 추론' },
        { key:'문장삽입', name:'문장삽입', sub:'삽입 위치' },
        { key:'글의순서', name:'글의 순서', sub:'순서 배열' },
        { key:'내용일치', name:'내용일치', sub:'일치 여부' },
        { key:'낱말쓰임', name:'낱말쓰임', sub:'어색한 낱말' },
        { key:'요약빈칸', name:'요약빈칸', sub:'(A)(B) 완성' },
      ],
      written: [
        { key:'단어배열', name:'단어배열', sub:'조건 배열' },
      ]
    },
    '복성고': {
      select: [
        { key:'빈칸추론',   name:'빈칸추론',   sub:'논리 추론' },
        { key:'문장삽입',   name:'문장삽입',   sub:'삽입 위치' },
        { key:'낱말쓰임',   name:'낱말쓰임',   sub:'어색한 낱말' },
        { key:'내용불일치', name:'내용불일치', sub:'불일치 여부' },
        { key:'밑줄의미',   name:'밑줄의미',   sub:'함축 의미' },
        { key:'글의순서',   name:'글의 순서', sub:'순서 배열' },
        { key:'요약빈칸',   name:'요약빈칸',   sub:'(A)(B) 완성' },
      ],
      written: [
        { key:'가정법영작', name:'가정법', sub:'조건 영작' },
        { key:'접속사영작', name:'접속사', sub:'조건 영작' },
      ]
    }
  };

  window.goStep2 = async () => {
    if (!selectedPassage) return;
    document.getElementById('sn1').classList.remove('active');
    document.getElementById('sn1').classList.add('done');
    document.getElementById('sn1').textContent = '✓';
    document.getElementById('sn2').classList.add('active');
    document.getElementById('st2').classList.add('active');
    document.getElementById('page-title').textContent = '유형 선택';
    document.getElementById('step1').classList.add('hidden');
    document.getElementById('step2').classList.remove('hidden');
    document.getElementById('selected-passage-info').textContent = '선택한 지문: ' + selectedPassage.name;

    // 진도 + 문제 존재 여부 로드
    await loadProgressAndQuestions();
    renderTypes();
  };

  async function loadProgressAndQuestions() {
    // 진도
    progressMap = {};
    try {
      if (userId) {
        const psnap = await getDocs(
          query(collection(db, 'progress_summary'), where('userId', '==', userId))
        );
        psnap.forEach(d => {
          const data = d.data();
          progressMap[data.passageId || d.id.replace(userId + '_', '')] = data;
        });
        // 옛 구조 호환
        const oldSnap = await getDocs(collection(db, 'progress_summary'));
        oldSnap.forEach(d => {
          if (!d.id.startsWith(userId + '_')) return;
          const pid = d.id.replace(userId + '_', '');
          if (!progressMap[pid]) progressMap[pid] = d.data();
        });
      }
    } catch(e) { console.warn(e); }

    // 문제 존재 여부
    questionMap = {};
    try {
      const qsnap = await getDocs(
        query(collection(db, 'questions'),
          where('passageId', '==', selectedPassage.id),
          where('school',    '==', school)
        )
      );
      qsnap.forEach(d => {
        const q = d.data();
        const key = q.typeName;
        questionMap[key] = (questionMap[key] || 0) + 1;
      });
    } catch(e) { console.warn(e); }
  }

  function renderTypes() {
    const types     = typeData[school] || typeData['매산고'];
    const passageProg = progressMap[selectedPassage.id] || {};

    const renderCard = (t) => {
      const hasQ      = (questionMap[t.key] || 0) >= 1;
      const prog      = passageProg[t.key];
      const round     = prog?.round || 0;
      const correct   = prog?.correct;
      const isPerfect = correct === 2;

      let progressText = '';
      if (round > 0) {
        const star = isPerfect ? ' ⭐' : '';
        progressText = `<div class="type-progress ${isPerfect ? 'done' : ''}">${round}회차${correct !== undefined ? ' · ' + correct + '/2' : ''}${star}</div>`;
      }

      const clickable = hasQ ? `onclick="selectType(this,'${t.key}')"` : '';
      const cls       = hasQ ? 'type-card has-questions' : 'type-card no-questions';

      return `<div class="${cls}" ${clickable}>
        <div class="type-name">${t.name}</div>
        <div class="type-sub">${t.sub}</div>
        ${progressText}
      </div>`;
    };

    document.getElementById('type-grid-select').innerHTML  = types.select.map(renderCard).join('');
    document.getElementById('type-grid-written').innerHTML = types.written.map(renderCard).join('');
  }

  window.selectType = (card, key) => {
    if (!card.classList.contains('has-questions')) return;
    document.querySelectorAll('.type-card').forEach(c => c.classList.remove('on'));
    card.classList.add('on');
    selectedType = key;
    document.getElementById('btn-step2').disabled = false;
  };

  window.goStep3 = () => {
    if (!selectedPassage || !selectedType) return;
    const passage = allPassages.find(p => p.id === selectedPassage.id);
    localStorage.setItem('selectedPassage', JSON.stringify({
      id:       selectedPassage.id,
      name:     selectedPassage.name,
      text:     passage?.text     || '',
      footnote: passage?.footnote || '',
    }));
    localStorage.setItem('selectedType', selectedType);
    window.location.href = 'quiz.html';
  };

  window.goBack = () => {
    const s2 = document.getElementById('step2');
    if (!s2.classList.contains('hidden')) {
      s2.classList.add('hidden');
      document.getElementById('step1').classList.remove('hidden');
      document.getElementById('sn1').classList.add('active');
      document.getElementById('sn1').classList.remove('done');
      document.getElementById('sn1').textContent = '1';
      document.getElementById('sn2').classList.remove('active');
      document.getElementById('st2').classList.remove('active');
      document.getElementById('page-title').textContent = '지문 선택';
      selectedType = null;
    } else {
      window.location.href = 'range.html';
    }
  };
</script>

</body>
</html>
