<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>지문/유형 선택 — 헤일리올라</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- 1. 범위 선택 -->
<div class="page" id="page-range">
  <div class="phone">
    <div class="top-bar with-back" style="justify-content:space-between">
      <div style="display:flex;align-items:center;gap:8px;flex:1">
        <button class="back-btn" onclick="goHome()">←</button>
        <div class="top-info">
          <div class="top-school" id="top-school-1">매산고</div>
          <div class="top-title">범위 선택</div>
        </div>
      </div>
      <button onclick="showMyHistory()" style="background:rgba(255,255,255,0.15);color:#fff;border:none;padding:7px 12px;border-radius:7px;font-size:12px;cursor:pointer;flex-shrink:0">📊 내 기록</button>
    </div>
    <div class="scroll-body">
      <div class="step-row">
        <div class="step"><div class="step-num active">1</div><div class="step-text active">범위</div></div>
        <div class="step-line"></div>
        <div class="step"><div class="step-num">2</div><div class="step-text">지문</div></div>
        <div class="step-line"></div>
        <div class="step"><div class="step-num">3</div><div class="step-text">유형</div></div>
      </div>

      <div style="background:#FFF5E8;border-radius:8px;padding:9px 12px;margin-bottom:12px;font-size:11px;color:#854F0B;line-height:1.5">
        💡 시험 범위를 선택하세요. 여러 개 가능!
      </div>

      <div id="range-list"><div class="empty-msg">불러오는 중...</div></div>

      <div class="selected-bar" style="margin-top:14px">
        <span class="selected-text">선택된 범위</span>
        <span class="selected-count" id="range-count">0개</span>
      </div>
      <button class="btn-main" onclick="goPassages()" id="btn-go-passages">다음: 지문 선택 →</button>
    </div>
  </div>
</div>

<!-- 2. 지문 선택 -->
<div class="page hidden" id="page-passage">
  <div class="phone">
    <div class="top-bar with-back">
      <button class="back-btn" onclick="backToRange()">←</button>
      <div class="top-info">
        <div class="top-school" id="top-school-2">매산고</div>
        <div class="top-title">지문 선택</div>
      </div>
    </div>
    <div class="scroll-body">
      <div class="step-row">
        <div class="step"><div class="step-num done">✓</div><div class="step-text">범위</div></div>
        <div class="step-line"></div>
        <div class="step"><div class="step-num active">2</div><div class="step-text active">지문</div></div>
        <div class="step-line"></div>
        <div class="step"><div class="step-num">3</div><div class="step-text">유형</div></div>
      </div>

      <div class="section-label">지문을 하나 선택해주세요</div>
      <div id="passage-list"><div class="empty-msg">불러오는 중...</div></div>
    </div>
  </div>
</div>

<!-- 3. 유형 선택 -->
<div class="page hidden" id="page-type">
  <div class="phone">
    <div class="top-bar with-back">
      <button class="back-btn" onclick="backToPassage()">←</button>
      <div class="top-info">
        <div class="top-school" id="top-school-3">매산고</div>
        <div class="top-title">유형 선택</div>
      </div>
    </div>
    <div class="scroll-body">
      <div class="step-row">
        <div class="step"><div class="step-num done">✓</div><div class="step-text">범위</div></div>
        <div class="step-line"></div>
        <div class="step"><div class="step-num done">✓</div><div class="step-text">지문</div></div>
        <div class="step-line"></div>
        <div class="step"><div class="step-num active">3</div><div class="step-text active">유형</div></div>
      </div>

      <div class="selected-bar" style="margin-bottom:14px">
        <span class="selected-text">선택한 지문</span>
        <span class="selected-count" id="selected-passage-name" style="cursor:pointer;background:#FFF5E8;color:#854F0B">변경하기</span>
      </div>

      <div style="font-size:11px;color:#5A7BAD;margin-bottom:12px;line-height:1.6">
        💡 유형을 하나 선택하면 2문제를 풀어요.<br>
        ⭐ 표시는 이미 다 맞춘 유형이에요.
      </div>

      <div class="section-label">선택형 유형</div>
      <div class="type-grid" id="type-grid-choice"></div>

      <div class="section-label">서답형 유형</div>
      <div class="type-grid" id="type-grid-short"></div>
    </div>
  </div>
</div>

  onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = 'index.html'; return; }

    const snap = await getDoc(doc(db,'users',user.uid));
    if (!snap.exists()) { window.location.href = 'index.html'; return; }
    const u = snap.data();
    userId = user.uid;
    localStorage.setItem('userId', userId);

    school = (u.school || '매산고') + '_' + (u.grade || '고2');
    localStorage.setItem('selectedSchool', school);

    const schoolDisplay = school.replace('_', ' ');
    document.getElementById('top-school-1').textContent = schoolDisplay;
    document.getElementById('top-school-2').textContent = schoolDisplay;
    document.getElementById('top-school-3').textContent = schoolDisplay;

    const keepPassage = localStorage.getItem('keepPassage');
    if (keepPassage === 'true') {
      const savedPassage = JSON.parse(localStorage.getItem('selectedPassage') || 'null');
      const savedPassages = JSON.parse(localStorage.getItem('selectedPassagesData') || '[]');
      if (savedPassage && savedPassage.id) {
        selectedPassagesData = savedPassages.length > 0 ? savedPassages : [savedPassage];
        selectedPassages = new Set(selectedPassagesData.map(p => p.id));
        await loadPassagesForSchool();
        await loadProgress();
        showTypeSelect();
        localStorage.removeItem('keepPassage');
        return;
      }
    }

    await loadPassagesForSchool();
    await loadProgress();
    renderRanges();
  });

  async function loadPassagesForSchool() {
    const snap = await getDocs(collection(db,'passages'));
    allPassages = [];
    snap.forEach(d => {
      const p = d.data();
      if ((p.schools||[]).includes(school)) {
        allPassages.push({ id: d.id, ...p });
      }
    });
  }

  async function loadProgress() {
    progressMap = {};
    try {
      const snap = await getDocs(query(collection(db,'progress_summary'), where('userId','==',userId)));
      snap.forEach(d => {
        const data = d.data();
        const pid = data.passageId;
        for (const k in data) {
          if (['userId','passageId','passageName','textbook','unit','num','mediaType'].includes(k)) continue;
          if (data[k]?.round && data[k]?.correct === 2) {
            progressMap[`${pid}_${k}`] = data[k].round;
          }
        }
      });
    } catch(e) {}
  }

  // 교재 종류별로 그룹화
  function getMediaIcon(type) {
    if (type === '교과서') return { icon: '📕', cls: 'textbook' };
    if (type === '부교재') return { icon: '📗', cls: 'workbook' };
    if (type === '모의고사') return { icon: '📊', cls: 'exam' };
    return { icon: '📖', cls: 'textbook' };
  }

  // 접기/펼치기 상태 관리
  let mediaOpened = { '교과서': true, '부교재': false, '모의고사': false };

  function renderRanges() {
    // range 단위로 그룹화
    const ranges = {};
    allPassages.forEach(p => {
      const key = p.range || `${p.mediaType||'교과서'}_${p.detail||''}`;
      if (!ranges[key]) {
        ranges[key] = {
          mediaType: p.mediaType || '교과서',
          detail: p.detail || p.unit || '',
          count: 0
        };
      }
      ranges[key].count++;
    });

    const el = document.getElementById('range-list');
    const keys = Object.keys(ranges);
    if (keys.length === 0) {
      el.innerHTML = '<div class="empty-msg">아직 등록된 지문이 없어요</div>';
      return;
    }

    // 교재 종류별로 분류
    const byMedia = { '교과서': [], '부교재': [], '모의고사': [] };
    keys.forEach(k => {
      const r = ranges[k];
      const mt = r.mediaType;
      if (!byMedia[mt]) byMedia[mt] = [];
      byMedia[mt].push({ key: k, ...r });
    });

    let html = '';
    ['교과서','부교재','모의고사'].forEach(mt => {
      const items = byMedia[mt] || [];
      if (items.length === 0) return;
      const info = getMediaIcon(mt);
      const isOpen = mediaOpened[mt];
      // 선택된 개수 카운트
      const selCnt = items.filter(i => selectedRanges.has(i.key)).length;
      
      html += `<div class="media-group">
        <div class="media-header ${isOpen?'open':''}" data-mediatype="${mt}">
          <div class="range-icon ${info.cls}">${info.icon}</div>
          <div class="range-info">
            <div class="range-name">${mt}</div>
            <div class="range-sub">${items.length}개 범위${selCnt > 0 ? ` · <b style="color:#2B5EB8">선택 ${selCnt}</b>` : ''}</div>
          </div>
          <span class="media-arrow ${isOpen?'open':''}">▼</span>
        </div>
        <div class="media-body ${isOpen?'open':''}">`;
      
      items.sort((a,b) => a.detail.localeCompare(b.detail));
      items.forEach(r => {
        const isSel = selectedRanges.has(r.key);
        const cls = isSel ? 'range-card selected' : 'range-card';
        html += `<div class="${cls}" data-range="${r.key}" style="margin:0 8px 5px 8px">
          <div class="range-icon ${info.cls}" style="width:26px;height:26px;font-size:13px">${info.icon}</div>
          <div class="range-info">
            <div class="range-name" style="font-size:13px">${r.detail}</div>
            <div class="range-sub" style="font-size:10px">${r.count}개 지문</div>
          </div>
          <div class="range-chk">${isSel ? '✓' : ''}</div>
        </div>`;
      });
      
      html += `</div></div>`;
    });

    el.innerHTML = html;

    // 펼치기/접기 이벤트
    document.querySelectorAll('[data-mediatype]').forEach(h => {
      h.onclick = (e) => {
        e.stopPropagation();
        const mt = h.dataset.mediatype;
        mediaOpened[mt] = !mediaOpened[mt];
        renderRanges();
      };
    });

    // 범위 선택 이벤트
    document.querySelectorAll('[data-range]').forEach(el => {
      el.onclick = (e) => {
        e.stopPropagation();
        const key = el.dataset.range;
        if (selectedRanges.has(key)) selectedRanges.delete(key);
        else selectedRanges.add(key);
        renderRanges();
      };
    });

    updateRangeCount();
  }

  function updateRangeCount() {
    document.getElementById('range-count').textContent = `${selectedRanges.size}개`;
  }

  window.goPassages = () => {
    if (selectedRanges.size === 0) { alert('범위를 1개 이상 선택해주세요.'); return; }
    document.getElementById('page-range').classList.add('hidden');
    document.getElementById('page-passage').classList.remove('hidden');
    renderPassages();
  };

  function renderPassages() {
    const filtered = allPassages.filter(p => {
      const key = p.range || `${p.mediaType||'교과서'}_${p.detail||''}`;
      return selectedRanges.has(key);
    });

    // 범위별로 그룹화
    const byRange = {};
    filtered.forEach(p => {
      const key = p.range || `${p.mediaType||'교과서'}_${p.detail||''}`;
      if (!byRange[key]) byRange[key] = [];
      byRange[key].push(p);
    });

    const el = document.getElementById('passage-list');
    if (filtered.length === 0) {
      el.innerHTML = '<div class="empty-msg">선택한 범위에 지문이 없어요</div>';
      return;
    }

    let html = `<div style="background:#FFF5E8;border-radius:8px;padding:9px 12px;margin-bottom:12px;font-size:12px;color:#854F0B;line-height:1.5">💡 여러 지문 선택 가능! 순서대로 풀이됩니다.</div>`;
    
    Object.keys(byRange).forEach(key => {
      const passages = byRange[key].sort((a,b) => (a.num||'').localeCompare(b.num||''));
      const first = passages[0];
      const mt = first.mediaType || '교과서';
      const detail = first.detail || first.unit || '';
      const info = getMediaIcon(mt);

      html += `<div class="range-group-label">${info.icon} ${mt} · ${detail}</div>`;
      passages.forEach(p => {
        const isSel = selectedPassages.has(p.id);
        const cls = isSel ? 'passage-card selected' : 'passage-card';
        html += `<div class="${cls}" data-pid="${p.id}">
          <div class="p-num">${p.num}</div>
          <div class="p-info">
            <div class="p-name">${detail} — ${p.num}번</div>
            <div class="p-sub">${(p.text||'').substring(0,40)}...</div>
          </div>
          <div class="p-chk">${isSel ? '✓' : ''}</div>
        </div>`;
      });
    });
    
    // 선택 카운트 + 다음 버튼
    html += `<div class="selected-bar" style="margin-top:14px">
      <span class="selected-text">선택한 지문</span>
      <span class="selected-count">${selectedPassages.size}개</span>
    </div>
    <button class="btn-main" id="btn-passages-next">다음: 유형 선택 →</button>`;
    
    el.innerHTML = html;
    
    // 이벤트
    document.querySelectorAll('[data-pid]').forEach(card => {
      card.onclick = () => {
        const pid = card.dataset.pid;
        if (selectedPassages.has(pid)) selectedPassages.delete(pid);
        else selectedPassages.add(pid);
        renderPassages();
      };
    });
    document.getElementById('btn-passages-next').onclick = () => {
      if (selectedPassages.size === 0) { alert('지문을 1개 이상 선택해주세요'); return; }
      // 선택된 지문 데이터 저장
      selectedPassagesData = Array.from(selectedPassages).map(pid => {
        const p = allPassages.find(x => x.id === pid);
        return {
          id: p.id, 
          name: `${p.detail || p.unit || ''} ${p.num}번`,
          text: p.text,
          mediaType: p.mediaType, detail: p.detail,
          textbook: p.textbook, unit: p.unit, num: p.num
        };
      });
      localStorage.setItem('selectedPassagesData', JSON.stringify(selectedPassagesData));
      // 첫 번째 지문을 기본 selectedPassage로 (유형 화면에서 사용)
      localStorage.setItem('selectedPassage', JSON.stringify(selectedPassagesData[0]));
      showTypeSelect();
    };
  }

  window.selectPassage = (pid, name) => {
    // 호환성용 (외부에서 호출하는 경우)
    if (selectedPassages.has(pid)) selectedPassages.delete(pid);
    else selectedPassages.add(pid);
    renderPassages();
  };

  function showTypeSelect() {
    document.getElementById('page-range').classList.add('hidden');
    document.getElementById('page-passage').classList.add('hidden');
    document.getElementById('page-type').classList.remove('hidden');

    // selectedPassage는 첫 번째 지문으로
    const firstPassage = selectedPassagesData[0] || JSON.parse(localStorage.getItem('selectedPassage') || 'null');
    if (!firstPassage) return;
    
    const cnt = selectedPassages.size || 1;
    const label = cnt > 1 ? `${cnt}개 지문 (연속 풀이)` : firstPassage.name;
    document.getElementById('selected-passage-name').textContent = label;

    const types = SCHOOL_TYPES[school];
    if (!types) {
      alert('이 학교의 유형이 정의되지 않았어요: ' + school);
      return;
    }

    renderTypeGrid('type-grid-choice', types.choice);
    renderTypeGrid('type-grid-short', types.short);
  }

  async function renderTypeGrid(containerId, types) {
    const el = document.getElementById(containerId);
    const qSnap = await getDocs(query(collection(db,'questions'),
      where('passageId','==',(selectedPassagesData[0] || JSON.parse(localStorage.getItem('selectedPassage'))).id),
      where('school','==',school)
    ));
    const existTypes = new Set();
    qSnap.forEach(d => existTypes.add(d.data().typeName));

    const uniqueTypes = [...new Set(types)];

    el.innerHTML = uniqueTypes.map(t => {
      const desc = TYPE_DESC[t] || t.replace(/_/g,' ');
      const firstP = selectedPassagesData[0] || JSON.parse(localStorage.getItem('selectedPassage'));
      const round = progressMap[`${firstP.id}_${t}`];
      const star = round ? `<div class="star">⭐</div>` : '';
      const hasQ = existTypes.has(t);
      const dis = hasQ ? '' : 'disabled';
      return `<div class="type-card ${dis}" onclick="${hasQ ? `selectType('${t}')` : ''}">
        ${star}
        <div class="type-name">${t.replace(/_/g,' ')}</div>
        <div class="type-sub">${hasQ ? desc : '(없음)'}</div>
      </div>`;
    }).join('');
  }

  window.selectType = (typeName) => {
    localStorage.setItem('selectedType', typeName);
    // 여러 지문 정보 저장
    if (selectedPassagesData.length > 0) {
      localStorage.setItem('selectedPassagesData', JSON.stringify(selectedPassagesData));
      localStorage.setItem('multiPassageMode', selectedPassagesData.length > 1 ? 'true' : 'false');
    }
    window.location.href = 'quiz.html';
  };

  document.getElementById('selected-passage-name').addEventListener('click', () => {
    selectedPassages = new Set();
    selectedPassagesData = [];
    localStorage.removeItem('selectedPassage');
    localStorage.removeItem('selectedPassagesData');
    document.getElementById('page-type').classList.add('hidden');
    document.getElementById('page-passage').classList.remove('hidden');
    renderPassages();
  });

  window.backToRange = () => {
    document.getElementById('page-passage').classList.add('hidden');
    document.getElementById('page-range').classList.remove('hidden');
  };

  window.backToPassage = () => {
    document.getElementById('page-type').classList.add('hidden');
    document.getElementById('page-passage').classList.remove('hidden');
    renderPassages();
  };

  window.goHome = () => {
    window.location.href = 'index.html';
  };
<!-- 내 학습 기록 -->
<div class="page hidden" id="page-history">
  <div class="phone">
    <div class="top-bar with-back">
      <button class="back-btn" onclick="hideMyHistory()">←</button>
      <div class="top-info">
        <div class="top-school" id="top-school-history">매산고</div>
        <div class="top-title">📊 내 학습 기록</div>
      </div>
    </div>
    <div class="scroll-body">
      <div id="history-stats" style="background:#fff;border:0.5px solid #D6E4FF;border-radius:10px;padding:14px;margin-bottom:14px;text-align:center">
        <div style="font-size:11px;color:#5A7BAD;margin-bottom:5px">전체 통계</div>
        <div id="history-total" style="font-size:14px;color:#1A3566">불러오는 중...</div>
      </div>
      <div id="history-list"><div class="empty-msg">학습 기록 불러오는 중...</div></div>
    </div>
  </div>
</div>

<script type="module">
  // 학습 기록 페이지 함수
  window.showMyHistory = async () => {
    document.getElementById('page-range').classList.add('hidden');
    document.getElementById('page-passage').classList.add('hidden');
    document.getElementById('page-type').classList.add('hidden');
    document.getElementById('page-history').classList.remove('hidden');
    document.getElementById('top-school-history').textContent = document.getElementById('top-school-1').textContent;
    await loadMyHistory();
  };
  
  window.hideMyHistory = () => {
    document.getElementById('page-history').classList.add('hidden');
    document.getElementById('page-range').classList.remove('hidden');
  };
  
  async function loadMyHistory() {
    const userId = localStorage.getItem('userId');
    const listEl = document.getElementById('history-list');
    const statsEl = document.getElementById('history-total');
    
    if (!userId) {
      listEl.innerHTML = '<div class="empty-msg">로그인이 필요해요</div>';
      return;
    }
    
    try {
      const { collection, getDocs, query, where } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
      const { db } = await import('./js/firebase.js');
      
      const snap = await getDocs(query(collection(db,'progress'), where('userId','==',userId)));
      
      if (snap.empty) {
        statsEl.textContent = '아직 학습 기록이 없어요';
        listEl.innerHTML = '<div class="empty-msg">문제를 풀고 다시 와보세요! 💪</div>';
        return;
      }
      
      // 통계 계산
      let totalSessions = 0;
      let totalCorrect = 0;
      const byDate = {};
      
      snap.forEach(d => {
        const data = d.data();
        const date = data.date;
        totalSessions++;
        if (data.correctCount === 2 || data.correct) totalCorrect++;
        if (!byDate[date]) byDate[date] = [];
        byDate[date].push(data);
      });
      
      statsEl.innerHTML = `총 <b style="color:#2B5EB8">${totalSessions}회</b> 학습 · <b style="color:#3B6D11">${totalCorrect}회</b> 완전 정답`;
      
      // 날짜별 표시
      let html = '';
      Object.keys(byDate).sort().reverse().forEach(date => {
        const items = byDate[date];
        const byPassage = {};
        items.forEach(it => {
          const pname = it.passageName || `${it.mediaType||''} ${it.detail||''} ${it.num||''}`;
          if (!byPassage[pname]) byPassage[pname] = [];
          byPassage[pname].push(it);
        });
        
        html += `<div style="background:#fff;border:0.5px solid #D6E4FF;border-radius:10px;padding:12px;margin-bottom:10px">
          <div style="font-size:12px;color:#5A7BAD;font-weight:500;margin-bottom:8px;display:flex;justify-content:space-between">
            <span>📅 ${formatDate(date)}</span>
            <span style="color:#3B6D11">${items.length}건</span>
          </div>`;
        
        Object.keys(byPassage).forEach(pname => {
          const types = byPassage[pname];
          html += `<div style="background:#F8FAFE;border-radius:7px;padding:8px 11px;margin-bottom:5px">
            <div style="font-size:12px;color:#1A3566;font-weight:500;margin-bottom:4px">${pname}</div>
            <div style="display:flex;flex-wrap:wrap;gap:4px">`;
          types.forEach(t => {
            const ok = t.correctCount === 2 || t.correct;
            const bg = ok ? '#EAF3DE' : '#FFE4E4';
            const cl = ok ? '#27500A' : '#854F0B';
            const score = t.correctCount ?? (t.correct?2:0);
            html += `<span style="background:${bg};color:${cl};font-size:10px;padding:3px 7px;border-radius:5px;font-weight:500">${t.typeName} ${score}/2</span>`;
          });
          html += `</div></div>`;
        });
        html += `</div>`;
      });
      
      listEl.innerHTML = html;
      
    } catch(e) {
      console.error(e);
      listEl.innerHTML = `<div class="empty-msg">기록을 불러올 수 없어요: ${e.message}</div>`;
    }
  }
  
  function formatDate(dateStr) {
    const d = new Date(dateStr);
    const days = ['일','월','화','수','목','금','토'];
    return `${d.getMonth()+1}/${d.getDate()} (${days[d.getDay()]})`;
  }
</script>
