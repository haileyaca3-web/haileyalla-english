<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>결과 — 헤일리올라</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="page">
  <div class="phone">
    <div class="top-bar">
      <div class="top-info">
        <div class="top-school" id="res-school">매산고</div>
        <div class="top-title">풀이 결과</div>
      </div>
    </div>

    <div class="scroll-body" style="text-align:center">
      <div style="font-size:20px;font-weight:600;color:#1A3566;margin:24px 0 8px" id="res-title">완벽해요</div>
      <div style="font-size:13px;color:#5A7BAD;margin-bottom:20px" id="res-sub"></div>

      <div style="background:#fff;border:0.5px solid #D6E4FF;border-radius:12px;padding:20px;margin-bottom:16px">
        <div style="font-size:13px;color:#5A7BAD;margin-bottom:6px" id="res-info"></div>
        <div style="font-size:36px;font-weight:700;color:#2B5EB8;margin:8px 0" id="res-score">2 / 2</div>
        <div style="font-size:12px;color:#888780" id="res-access">1번 접속</div>
      </div>

      <div style="background:#EBF2FF;border-radius:10px;padding:14px;margin-bottom:20px;font-size:12px;color:#1A3566;line-height:1.7" id="res-msg">
        도전을 더 해보고 싶다면 [다시 풀기]를 눌러주세요.
      </div>

      <button class="btn-main" onclick="retryAgain()" style="margin-bottom:8px">다시 풀기</button>
      <button class="btn-sub" onclick="otherType()" style="margin-bottom:8px">다른 유형 풀기</button>
      <button class="btn-sub" onclick="otherPassage()" style="margin-bottom:8px">다른 지문 선택</button>
      <button class="btn-sub" onclick="goHome()">홈으로</button>
    </div>
  </div>
</div>

<script>
  const data = JSON.parse(localStorage.getItem('lastResult') || '{}');
  const school = localStorage.getItem('selectedSchool') || '매산고';

  document.getElementById('res-school').textContent = school.replace('_', ' ');
  document.getElementById('res-info').textContent = `${data.passageName || ''} · ${(data.typeName||'').replace(/_/g,' ')}`;
  document.getElementById('res-score').textContent = `${data.correctCount || 0} / ${data.totalQuestions || 2}`;
  document.getElementById('res-access').textContent = `${data.round || 1}번 접속`;

  const cc = data.correctCount || 0;
  const total = data.totalQuestions || 2;

  if (cc === total) {
    document.getElementById('res-title').textContent = '완벽해요';
    document.getElementById('res-sub').textContent = `${(data.typeName||'').replace(/_/g,' ')} 유형을 다 맞췄어요`;
    document.getElementById('res-msg').innerHTML = '이 유형은 ⭐ 표시가 붙어요.<br>도전을 더 해보고 싶다면 [다시 풀기]를 눌러주세요.';
  } else if (cc === 0) {
    document.getElementById('res-title').textContent = '괜찮아요';
    document.getElementById('res-sub').textContent = '다시 도전해보세요';
    document.getElementById('res-msg').innerHTML = '아직 헷갈리는 부분이 있어요. [다시 풀기]로 한 번 더 풀어보세요!';
  } else {
    document.getElementById('res-title').textContent = '잘 했어요';
    document.getElementById('res-sub').textContent = `${cc}개 맞췄어요`;
    document.getElementById('res-msg').innerHTML = '조금만 더! [다시 풀기]로 한 번 더 풀어보세요.';
  }

  window.retryAgain = () => {
    window.location.href = 'quiz.html';
  };

  window.otherType = () => {
    localStorage.setItem('keepPassage', 'true');
    window.location.href = 'passage.html';
  };

  window.otherPassage = () => {
    localStorage.removeItem('keepPassage');
    localStorage.removeItem('selectedPassage');
    window.location.href = 'passage.html';
  };

  window.goHome = () => {
    localStorage.removeItem('keepPassage');
    window.location.href = 'index.html';
  };
</script>

</body>
</html>
