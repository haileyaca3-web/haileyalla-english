<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>문제 풀기 — 헤일리올라</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="page">
  <div class="phone">
    <div class="top-bar with-back" style="justify-content:space-between">
      <button class="back-btn" onclick="window.location.href='passage.html'">←</button>
      <div class="top-info">
        <div class="top-school" id="quiz-school">매산고</div>
        <div class="top-title" id="quiz-passage">지문 로딩 중...</div>
      </div>
      <div class="round-badge" id="round-badge"></div>
    </div>

    <div class="scroll-body" id="quiz-body">
      <!-- 로딩 -->
      <div id="loading-screen" style="text-align:center;padding:40px 20px">
        <div style="font-size:13px;color:#1A3566;font-weight:500;margin-bottom:8px">문제 불러오는 중...</div>
        <div style="margin-top:16px;font-size:20px">⏳</div>
      </div>

      <!-- 문제 -->
      <div id="quiz-content" style="display:none">
        <div class="q-meta">
          <span class="q-type" id="q-type-label">유형</span>
          <span class="q-pts" id="q-pts-label">문제 1/2</span>
        </div>
        <div class="q-text" id="q-text"></div>
        <div class="passage" id="q-passage"></div>
        <div class="options" id="q-options"></div>

        <div class="result-box result-correct" id="res-correct"></div>
        <div class="result-box result-wrong1" id="res-wrong1"></div>
        <div class="result-box result-wrong2" id="res-wrong2"></div>
        <div class="explanation" id="q-explanation"></div>

        <div style="display:flex;flex-direction:column;gap:7px">
          <button class="btn-main" id="btn-check" onclick="checkAnswer()">정답 확인</button>
        </div>
      </div>

      <!-- 오류 -->
      <div id="error-screen" style="display:none;text-align:center;padding:30px 20px">
        <div style="font-size:13px;color:#E24B4A;margin-bottom:8px" id="error-msg">문제를 불러올 수 없어요</div>
        <div style="font-size:12px;color:#888780;margin-bottom:16px">관리자에게 문의해주세요</div>
        <button class="btn-main" onclick="window.location.href='passage.html'">지문 선택으로</button>
      </div>
    </div>
  </div>
</div>

<style>
.opt input[type=text], .opt textarea {
  width:100%; padding:8px 10px; border:0.5px solid #D6E4FF; border-radius:6px;
  font-size:13px; color:#2C2C2A; background:#fff; box-sizing:border-box;
}
.opt textarea { min-height:60px; resize:vertical; font-family:inherit; }
.short-input-wrap { background:#F5F8FF; border:0.5px solid #D6E4FF; border-radius:8px;
  padding:10px 12px; margin-bottom:8px; }
.short-input-wrap label { font-size:11px; color:#5A7BAD; display:block; margin-bottom:4px; }
.rb { display:inline-block; width:18px; height:18px; border-radius:50%; font-size:10px;
  text-align:center; line-height:18px; margin-left:3px; font-weight:500; }
.rb.active { background:#fff; color:#1A3566; }
.rb.inactive { background:rgba(255,255,255,0.2); color:rgba(255,255,255,0.6); }
.rb.done { background:#A8D472; color:#fff; }
</style>

<script type="module">
  import { auth, db } from './js/firebase.js';
  import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { collection, getDocs, query, where, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // ── 데이터 로드 ──
  const school   = localStorage.getItem('selectedSchool') || '매산고';
  const passage  = JSON.parse(localStorage.getItem('selectedPassage') || '{}');
  const typeName = localStorage.getItem('selectedType') || '';
  const userId   = localStorage.getItem('userId');

  let questions       = [];     // 이 유형의 문제 2개
  let currentQIdx     = 0;      // 현재 푸는 문제 index (0 또는 1)
  let currentRound    = 1;      // 이번 도전 회차
  let correctCount    = 0;      // 이번 회차에 맞춘 개수
  let wrongAttempts   = 0;      // 현재 문제에서 틀린 횟수
  let selectedOptIdx  = null;

  document.getElementById('quiz-school').textContent  = school;
  document.getElementById('quiz-passage').textContent = passage.name || '지문';
  document.getElementById('q-type-label').textContent = typeName;

  // 로그인
  onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = 'index.html'; return; }
    if (!passage.id || !typeName) {
      showError('지문 또는 유형 정보가 없어요.');
      return;
    }
    await loadProgressRound();
    await loadQuestions();
  });

  // ──────────────────────────────────────
  // 이전 회차 확인 → 새 회차 = 이전+1
  // ──────────────────────────────────────
  async function loadProgressRound() {
    try {
      const summaryId = `${userId}_${passage.id}`;
      const snap = await getDoc(doc(db, 'progress_summary', summaryId));
      if (snap.exists()) {
        const data = snap.data();
        const prevRound = data[typeName]?.round || 0;
        currentRound = prevRound + 1;
      }
    } catch(e) { console.warn(e); }
  }

  // ──────────────────────────────────────
  // Firestore에서 이 지문 + 학교 + 유형의 문제 2개 가져오기
  // ──────────────────────────────────────
  async function loadQuestions() {
    try {
      const snap = await getDocs(
        query(collection(db, 'questions'),
          where('passageId', '==', passage.id),
          where('school',    '==', school),
          where('typeName',  '==', typeName)
        )
      );

      questions = [];
      snap.forEach(d => questions.push({ id: d.id, ...d.data() }));
      questions.sort((a, b) => (a.idx || 0) - (b.idx || 0));

      if (questions.length === 0) {
        showError('이 유형의 문제가 아직 생성되지 않았어요.');
        return;
      }

      currentQIdx = 0;
      correctCount = 0;
      renderRoundBadge();
      renderCurrentQuestion();

    } catch(e) {
      console.error(e);
      showError('문제를 불러오지 못했어요: ' + e.message);
    }
  }

  // ──────────────────────────────────────
  // 회차 뱃지
  // ──────────────────────────────────────
  function renderRoundBadge() {
    const badge = document.getElementById('round-badge');
    badge.innerHTML = `<span style="font-size:10px;color:#fff">${currentRound}회차</span>`;
  }

  // ──────────────────────────────────────
  // 현재 문제 렌더링
  // ──────────────────────────────────────
  function renderCurrentQuestion() {
    const q = questions[currentQIdx];
    if (!q) {
      showError('문제 데이터가 없어요.');
      return;
    }

    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('error-screen').style.display   = 'none';
    document.getElementById('quiz-content').style.display   = 'block';

    document.getElementById('q-pts-label').textContent = `문제 ${currentQIdx + 1}/2`;
    document.getElementById('q-text').textContent      = q.question || '';
    document.getElementById('q-passage').innerHTML     = formatPassage(passage.text || '');

    // 결과/해설 초기화
    document.getElementById('res-correct').classList.remove('show');
    document.getElementById('res-wrong1').classList.remove('show');
    document.getElementById('res-wrong2').classList.remove('show');
    document.getElementById('q-explanation').classList.remove('show');

    const optsEl = document.getElementById('q-options');
    optsEl.innerHTML = '';
    selectedOptIdx = null;
    wrongAttempts  = 0;

    const isChoice = q.format === 'choice' || (q.choices && q.choices.length > 0);

    if (isChoice) {
      // 선택형
      const nums = ['①','②','③','④','⑤'];
      (q.choices || []).forEach((opt, i) => {
        const div = document.createElement('div');
        div.className = 'opt';
        const cleanOpt = String(opt).replace(/^[①②③④⑤]\s*/, '').replace(/^[1-5][\.\)]\s*/, '');
        div.innerHTML = `<div class="opt-num">${nums[i] || (i+1)}</div><span>${cleanOpt}</span>`;
        div.onclick = () => selectOption(div, i);
        optsEl.appendChild(div);
      });
      document.getElementById('btn-check').textContent = '정답 확인';
      document.getElementById('btn-check').onclick = checkAnswer;
    } else {
      // 서답형
      const wrap = document.createElement('div');
      wrap.className = 'short-input-wrap';
      wrap.innerHTML = `
        <label>답안 입력</label>
        <textarea id="short-answer" placeholder="답을 입력하세요"></textarea>
      `;
      optsEl.appendChild(wrap);
      document.getElementById('btn-check').textContent = '제출';
      document.getElementById('btn-check').onclick = checkShortAnswer;
    }
  }

  function formatPassage(text) {
    return (text || '').replace(/([①②③④⑤])/g, '<u>$1</u>');
  }

  // ──────────────────────────────────────
  // 선택형
  // ──────────────────────────────────────
  function selectOption(div, idx) {
    if (div.classList.contains('disabled')) return;
    document.querySelectorAll('.opt').forEach(o => o.classList.remove('selected'));
    div.classList.add('selected');
    selectedOptIdx = idx;
  }

  window.checkAnswer = () => {
    if (selectedOptIdx === null) {
      alert('답을 선택해주세요.');
      return;
    }
    const q = questions[currentQIdx];
    const userAns = selectedOptIdx + 1;            // 1~5
    const correctAns = parseInt(q.answer);          // 1~5 숫자

    document.querySelectorAll('.opt').forEach(o => o.classList.add('disabled'));

    if (userAns === correctAns) {
      // 정답
      const opts = document.querySelectorAll('.opt');
      opts[selectedOptIdx].classList.remove('selected');
      opts[selectedOptIdx].classList.add('correct');

      document.getElementById('res-correct').textContent = '✅ 정답이에요!';
      document.getElementById('res-correct').classList.add('show');
      showExplanation(q);
      correctCount++;

      proceedToNext();

    } else {
      // 오답
      const opts = document.querySelectorAll('.opt');
      opts[selectedOptIdx].classList.remove('selected');
      opts[selectedOptIdx].classList.add('wrong');
      wrongAttempts++;

      if (wrongAttempts === 1) {
        // 한 번 더 기회
        document.getElementById('res-wrong1').textContent = '아쉬워요! 다시 한 번 생각해보세요.';
        document.getElementById('res-wrong1').classList.add('show');
        document.getElementById('btn-check').textContent = '다시 선택';
        document.getElementById('btn-check').onclick = retryChoice;
      } else {
        // 두 번 틀림 → 오답 처리
        document.getElementById('res-wrong2').textContent = `정답은 ${correctAns}번이에요.`;
        document.getElementById('res-wrong2').classList.add('show');
        opts[correctAns - 1]?.classList.add('correct');
        showExplanation(q);
        proceedToNext();
      }
    }
  };

  function retryChoice() {
    document.getElementById('res-wrong1').classList.remove('show');
    document.querySelectorAll('.opt').forEach(o => {
      if (!o.classList.contains('wrong')) o.classList.remove('disabled');
    });
    selectedOptIdx = null;
    document.getElementById('btn-check').textContent = '정답 확인';
    document.getElementById('btn-check').onclick = checkAnswer;
  }

  // ──────────────────────────────────────
  // 서답형 (단순 비교 채점, 추후 AI 채점 가능)
  // ──────────────────────────────────────
  window.checkShortAnswer = () => {
    const userAns = document.getElementById('short-answer').value.trim();
    if (!userAns) {
      alert('답을 입력해주세요.');
      return;
    }
    const q = questions[currentQIdx];
    const modelAns = String(q.answer || '').trim();

    // 간단한 정답 판정 (대소문자/공백 무시 후 모범답안과 비교)
    const normalize = s => s.toLowerCase().replace(/\s+/g, ' ').replace(/[.,!?]/g, '');
    const isCorrect = normalize(userAns) === normalize(modelAns);

    document.getElementById('short-answer').disabled = true;

    if (isCorrect) {
      document.getElementById('res-correct').textContent = '✅ 정답이에요!';
      document.getElementById('res-correct').classList.add('show');
      correctCount++;
    } else {
      document.getElementById('res-wrong2').innerHTML = `
        <div>✏️ 모범 답안과 비교해보세요.</div>
        <div style="margin-top:6px;font-size:11px;color:#5A7BAD">내 답: ${userAns}</div>
        <div style="font-size:11px;color:#3B6D11;margin-top:2px">모범 답안: ${modelAns}</div>
      `;
      document.getElementById('res-wrong2').classList.add('show');
      // 서답형은 1번만 기회 — 모범답안 보여주고 학생이 스스로 판단
    }
    showExplanation(q);
    proceedToNext();
  };

  // ──────────────────────────────────────
  // 해설 표시
  // ──────────────────────────────────────
  function showExplanation(q) {
    const el = document.getElementById('q-explanation');
    let html = '<div class="exp-title">해설</div>';
    html += q.explanation || '(해설 없음)';
    el.innerHTML = html;
    el.classList.add('show');
  }

  // ──────────────────────────────────────
  // 다음 문제 or 회차 종료
  // ──────────────────────────────────────
  function proceedToNext() {
    document.getElementById('btn-check').textContent = currentQIdx === 0 ? '다음 문제 →' : '결과 보기 →';
    document.getElementById('btn-check').onclick = () => {
      if (currentQIdx === 0) {
        currentQIdx = 1;
        renderCurrentQuestion();
      } else {
        finishRound();
      }
    };
  }

  // ──────────────────────────────────────
  // 회차 종료 → progress 저장 → 결과 화면
  // ──────────────────────────────────────
  async function finishRound() {
    const today = new Date().toISOString().split('T')[0];
    try {
      // 1) progress: 회차별 기록 (개별)
      const progressId = `${userId}_${passage.id}_${typeName}_${currentRound}_${today}`;
      await setDoc(doc(db, 'progress', progressId), {
        userId,
        passageId: passage.id,
        typeName,
        round: currentRound,
        correct: correctCount === 2,    // 호환용 (2개 다 맞춰야 true)
        correctCount,                    // 0/1/2
        totalQuestions: 2,
        date: today,
        createdAt: new Date().toISOString()
      });

      // 2) progress_summary: 유형별 최신 상태
      const summaryId = `${userId}_${passage.id}`;
      const sSnap = await getDoc(doc(db, 'progress_summary', summaryId));
      const existing = sSnap.exists() ? sSnap.data() : {};
      existing.userId = userId;
      existing.passageId = passage.id;
      existing[typeName] = {
        round: currentRound,
        correct: correctCount,
        date: today
      };
      await setDoc(doc(db, 'progress_summary', summaryId), existing);
    } catch(e) {
      console.error('저장 실패:', e);
    }

    // 결과 화면으로 (결과 화면 없으면 일단 passage.html 로)
    localStorage.setItem('lastResult', JSON.stringify({
      passageName: passage.name,
      typeName,
      round: currentRound,
      correctCount,
      totalQuestions: 2,
    }));

    // result.html 있으면 그쪽으로, 없으면 passage.html
    window.location.href = 'result.html';
  }

  // ──────────────────────────────────────
  // 오류 화면
  // ──────────────────────────────────────
  function showError(msg) {
    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('quiz-content').style.display   = 'none';
    document.getElementById('error-screen').style.display   = 'block';
    document.getElementById('error-msg').textContent        = msg;
  }
</script>

</body>
</html>
