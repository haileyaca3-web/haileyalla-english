<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>문제 풀기 — 헤일리올라</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="page">
  <div class="phone">
    <div class="top-bar with-back" style="justify-content:space-between">
      <button class="back-btn" onclick="window.location.href='passage.html'">←</button>
      <div class="top-info">
        <div class="top-school" id="quiz-school">매산고</div>
        <div class="top-title" id="quiz-passage">지문</div>
      </div>
      <div class="round-badge" id="round-badge"></div>
    </div>

    <div class="scroll-body" id="quiz-body">
      <div id="loading-screen" style="text-align:center;padding:40px 20px">
        <div style="font-size:13px;color:#1A3566;font-weight:500">문제 불러오는 중...</div>
        <div style="margin-top:16px;font-size:20px">⏳</div>
      </div>

      <div id="quiz-content" style="display:none">
        <div class="q-meta">
          <span class="q-type" id="q-type-label">유형</span>
          <span class="q-pts" id="q-pts-label">문제 1/2</span>
        </div>
        <div class="q-text" id="q-text"></div>
        <div id="q-display"></div>
        <div id="q-input"></div>
        <div class="result-box result-correct" id="res-correct"></div>
        <div class="result-box result-wrong1" id="res-wrong1"></div>
        <div class="result-box result-wrong2" id="res-wrong2"></div>
        <div class="explanation" id="q-explanation"></div>
        <div id="btn-area">
          <button class="btn-main" id="btn-check" onclick="checkAnswer()">정답 확인</button>
        </div>
      </div>

      <div id="error-screen" style="display:none;text-align:center;padding:30px 20px">
        <div style="font-size:13px;color:#E24B4A;margin-bottom:8px" id="error-msg">문제를 불러올 수 없어요</div>
        <button class="btn-main" onclick="window.location.href='passage.html'">지문 선택으로</button>
      </div>
    </div>
  </div>
</div>

<style>
.given-box {
  background:#FFF5E8; border:0.5px solid #E5B774; border-radius:8px;
  padding:10px 12px; margin-bottom:12px; font-size:13px; color:#854F0B; line-height:1.7;
}
.given-box-title { font-size:10px; color:#A07020; font-weight:600; margin-bottom:4px; }
.passage-box {
  background:#fff; border:0.5px solid #D6E4FF; border-radius:8px;
  padding:12px; margin-bottom:12px; font-size:13px; color:#2C2C2A; line-height:1.9;
}
.summary-box {
  background:#F5F8FF; border:0.5px solid #A8C4F5; border-radius:8px;
  padding:10px 12px; margin-bottom:12px; font-size:13px; color:#1A3566; line-height:1.7;
  font-style: italic;
}
.para-box {
  background:#fff; border:0.5px solid #D6E4FF; border-radius:8px;
  padding:10px 12px; margin-bottom:6px; font-size:13px; color:#2C2C2A; line-height:1.8;
}
.para-label { font-weight:600; color:#2B5EB8; margin-right:4px; }
.word-bank { background:#EEEDFE; border-radius:8px; padding:8px 12px; margin-bottom:8px; font-size:12px; color:#3C3489; }
.conditions-list { font-size:11px; color:#5A7BAD; margin-bottom:8px; line-height:1.7; }
.short-input-wrap { margin-bottom:8px; }
.short-input-wrap label { font-size:11px; color:#5A7BAD; display:block; margin-bottom:4px; }
.short-input-wrap input, .short-input-wrap textarea {
  width:100%; padding:8px 10px; border:0.5px solid #D6E4FF; border-radius:6px;
  font-size:13px; color:#2C2C2A; background:#fff; box-sizing:border-box;
}
.short-input-wrap textarea { min-height:60px; resize:vertical; font-family:inherit; }
.opt-num-only {
  display:flex; align-items:center; justify-content:center;
  font-size:14px; font-weight:500; color:#2B5EB8;
  width:36px; height:36px;
}
.passage-marked .num-mark {
  color:#2B5EB8; font-weight:600; font-size:15px;
}
.passage-marked .underline-text {
  text-decoration: underline;
  text-underline-offset: 3px;
  text-decoration-thickness: 1.5px;
  font-weight: 500;
}
.blank-mark {
  display: inline-block;
  min-width: 110px;
  border-bottom: 2px solid #2B5EB8;
  margin: 0 2px;
}
.self-check-row {
  display:flex; gap:8px; margin-bottom:8px;
}
.self-check-row button {
  flex:1; padding:10px; border-radius:8px; font-size:13px;
  font-weight:500; cursor:pointer; border:0.5px solid;
}
.self-check-row .sc-correct { background:#EAF3DE; border-color:#A8D472; color:#27500A; }
.self-check-row .sc-wrong { background:#FFE4E4; border-color:#E5B774; color:#854F0B; }
</style>

<script type="module">
  import { auth, db } from './js/firebase.js';
  import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { collection, getDocs, query, where, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const school   = localStorage.getItem('selectedSchool') || '매산고';
  const passage  = JSON.parse(localStorage.getItem('selectedPassage') || '{}');
  const typeName = localStorage.getItem('selectedType') || '';
  const userId   = localStorage.getItem('userId');

  let questions      = [];
  let currentQIdx    = 0;
  let currentRound   = 1;
  let correctCount   = 0;
  let wrongAttempts  = 0;
  let selectedOptIdx = null;

  document.getElementById('quiz-school').textContent  = school;
  document.getElementById('quiz-passage').textContent = passage.name || '지문';
  document.getElementById('q-type-label').textContent = typeName.replace('_', ' ');

  onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = 'index.html'; return; }
    if (!passage.id || !typeName) { showError('지문 또는 유형 정보가 없어요.'); return; }
    await loadProgressRound();
    await loadQuestions();
  });

  async function loadProgressRound() {
    try {
      const snap = await getDoc(doc(db, 'progress_summary', `${userId}_${passage.id}`));
      if (snap.exists()) {
        const data = snap.data();
        const prevRound = data[typeName]?.round || 0;
        currentRound = prevRound + 1;
      }
    } catch(e) {}
  }

  async function loadQuestions() {
    try {
      const snap = await getDocs(
        query(collection(db, 'questions'),
          where('passageId', '==', passage.id),
          where('school',    '==', school),
          where('typeName',  '==', typeName)
        )
      );
      questions = [];
      snap.forEach(d => questions.push({ id: d.id, ...d.data() }));
      questions.sort((a, b) => (a.idx || 0) - (b.idx || 0));
      if (questions.length === 0) { showError('이 유형의 문제가 아직 없어요.'); return; }
      currentQIdx = 0;
      correctCount = 0;
      renderRoundBadge();
      renderCurrentQuestion();
    } catch(e) { showError('문제 로딩 실패: ' + e.message); }
  }

  function renderRoundBadge() {
    document.getElementById('round-badge').innerHTML = `<span style="font-size:10px;color:#fff">${currentRound}회차</span>`;
  }

  function renderCurrentQuestion() {
    const q = questions[currentQIdx];
    if (!q) { showError('문제 데이터가 없어요.'); return; }

    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('error-screen').style.display   = 'none';
    document.getElementById('quiz-content').style.display   = 'block';

    document.getElementById('q-pts-label').textContent = `문제 ${currentQIdx + 1}/2`;
    document.getElementById('q-text').textContent      = q.question || '';

    document.getElementById('res-correct').classList.remove('show');
    document.getElementById('res-wrong1').classList.remove('show');
    document.getElementById('res-wrong2').classList.remove('show');
    document.getElementById('q-explanation').classList.remove('show');

    const displayEl = document.getElementById('q-display');
    const inputEl   = document.getElementById('q-input');
    displayEl.innerHTML = '';
    inputEl.innerHTML = '';

    selectedOptIdx = null;
    wrongAttempts  = 0;

    const fmt = q.format;

    if (fmt === 'irrelevant') {
      displayEl.innerHTML = `<div class="passage-box passage-marked">${formatCircled(q.passage_marked)}</div>`;
      renderNumberChoices(inputEl);
    }
    else if (fmt === 'order') {
      displayEl.innerHTML = `
        <div class="given-box">
          <div class="given-box-title">주어진 글</div>
          ${q.given_text || ''}
        </div>
        <div class="para-box"><span class="para-label">(A)</span>${q.para_a || ''}</div>
        <div class="para-box"><span class="para-label">(B)</span>${q.para_b || ''}</div>
        <div class="para-box"><span class="para-label">(C)</span>${q.para_c || ''}</div>
      `;
      renderTextChoices(inputEl, q.choices);
    }
    else if (fmt === 'summary_blank') {
      displayEl.innerHTML = `
        <div class="passage-box">${q.passage_text || ''}</div>
        <div class="summary-box">${q.summary_template || ''}</div>
      `;
      renderTextChoices(inputEl, q.choices);
    }
    else if (fmt === 'insert') {
      displayEl.innerHTML = `
        <div class="given-box">
          <div class="given-box-title">주어진 문장</div>
          ${q.given_sentence || ''}
        </div>
        <div class="passage-box passage-marked">${formatCircled(q.passage_marked)}</div>
      `;
      renderNumberChoices(inputEl);
    }
    else if (fmt === 'word' || fmt === 'grammar') {
      displayEl.innerHTML = `<div class="passage-box passage-marked">${formatCircledWithUnderline(q.passage_marked)}</div>`;
      renderTextChoices(inputEl, q.choices);
    }
    else if (fmt === 'blank') {
      displayEl.innerHTML = `<div class="passage-box passage-marked">${formatBlank(q.passage_with_blank)}</div>`;
      renderTextChoices(inputEl, q.choices);
    }
    else if (fmt === 'title') {
      displayEl.innerHTML = `<div class="passage-box">${q.passage_text || ''}</div>`;
      renderTextChoices(inputEl, q.choices);
    }
    else if (fmt === 'underline') {
      displayEl.innerHTML = `<div class="passage-box passage-marked">${formatBracketUnderline(q.passage_with_underline)}</div>`;
      renderTextChoices(inputEl, q.choices);
    }
    else if (fmt === 'short_summary') {
      displayEl.innerHTML = `
        <div class="passage-box">${q.passage_text || ''}</div>
        <div class="summary-box">${q.summary_template || ''}</div>
      `;
      inputEl.innerHTML = `
        <div class="short-input-wrap">
          <label>(A) — 영어 2단어</label>
          <input type="text" id="ans-a" placeholder="예: positive thinking">
        </div>
        <div class="short-input-wrap">
          <label>(B) — 영어 2단어</label>
          <input type="text" id="ans-b" placeholder="예: ignore obstacles">
        </div>
      `;
    }
    else if (fmt === 'short_korean') {
      displayEl.innerHTML = `<div class="passage-box">${q.passage_text || ''}</div>`;
      inputEl.innerHTML = `
        <div class="short-input-wrap">
          <label>이유 1</label>
          <textarea id="ans-1" placeholder="우리말로 서술하세요"></textarea>
        </div>
        <div class="short-input-wrap">
          <label>이유 2</label>
          <textarea id="ans-2" placeholder="우리말로 서술하세요"></textarea>
        </div>
      `;
    }
    else if (fmt === 'short_translate') {
      let html = `<div class="passage-box passage-marked">${formatBracketUnderline(q.passage_with_korean)}</div>`;
      if (q.word_bank && q.word_bank.length) html += `<div class="word-bank"><b>보기:</b> ${q.word_bank.join(' / ')}</div>`;
      if (q.conditions && q.conditions.length) html += `<div class="conditions-list"><b>조건:</b><br>${q.conditions.map((c,i)=>`${i+1}. ${c}`).join('<br>')}</div>`;
      displayEl.innerHTML = html;
      inputEl.innerHTML = `<div class="short-input-wrap"><label>영작</label><textarea id="ans-write" placeholder="영어로 작성하세요"></textarea></div>`;
    }
    else if (fmt === 'match_kor' || fmt === 'match_eng') {
      displayEl.innerHTML = `<div class="passage-box">${q.passage_text || ''}</div>`;
      renderTextChoices(inputEl, q.choices);
    }
    else if (fmt === 'short_arrange') {
      let html = `<div class="passage-box">${q.passage_text || ''}</div>`;
      if (q.scrambled_words && q.scrambled_words.length) html += `<div class="word-bank"><b>단어:</b> ${q.scrambled_words.join(' / ')}</div>`;
      displayEl.innerHTML = html;
      inputEl.innerHTML = `<div class="short-input-wrap"><label>배열한 문장</label><textarea id="ans-write" placeholder="단어들을 올바른 순서로 배열하세요"></textarea></div>`;
    }
    else if (fmt === 'short_subjunctive' || fmt === 'short_conjunction') {
      displayEl.innerHTML = `
        <div class="passage-box">${q.passage_text || ''}</div>
        <div class="given-box">
          <div class="given-box-title">한국어 문장</div>
          ${q.korean_sentence || ''}
        </div>
      `;
      inputEl.innerHTML = `<div class="short-input-wrap"><label>영작</label><textarea id="ans-write" placeholder="영어로 작성하세요"></textarea></div>`;
    }
    else {
      displayEl.innerHTML = `<div class="passage-box">${passage.text || ''}</div>`;
      if (q.choices && q.choices.length) renderTextChoices(inputEl, q.choices);
      else inputEl.innerHTML = `<div class="short-input-wrap"><label>답안</label><textarea id="ans-write"></textarea></div>`;
    }

    // 버튼 재설정
    const isChoice = isChoiceFormat(fmt);
    setupCheckButton(isChoice);
  }

  function setupCheckButton(isChoice) {
    const area = document.getElementById('btn-area');
    area.innerHTML = `<button class="btn-main" id="btn-check">${isChoice ? '정답 확인' : '제출'}</button>`;
    document.getElementById('btn-check').onclick = isChoice ? checkAnswer : checkShortAnswer;
  }

  function isChoiceFormat(fmt) {
    return ['irrelevant','order','summary_blank','insert','word','grammar','blank','title','underline','match_kor','match_eng'].includes(fmt);
  }

  // ════════════════════════════════════════
  // 선택지 렌더링
  // ════════════════════════════════════════
  function renderNumberChoices(container) {
    const nums = ['①','②','③','④','⑤'];
    let html = '<div class="options">';
    nums.forEach((n, i) => {
      html += `<div class="opt" onclick="selectOption(this,${i})"><div class="opt-num-only">${n}</div></div>`;
    });
    html += '</div>';
    container.innerHTML = html;
  }

  function renderTextChoices(container, choices) {
    if (!choices || !choices.length) {
      container.innerHTML = '<div style="font-size:12px;color:#E24B4A">선택지가 없어요</div>';
      return;
    }
    const nums = ['①','②','③','④','⑤'];
    let html = '<div class="options">';
    choices.forEach((c, i) => {
      const clean = String(c).replace(/^[①②③④⑤]\s*/, '').replace(/^[1-5][\.\)]\s*/, '');
      html += `<div class="opt" onclick="selectOption(this,${i})">
        <div class="opt-num">${nums[i] || (i+1)}</div>
        <span>${clean}</span>
      </div>`;
    });
    html += '</div>';
    container.innerHTML = html;
  }

  // ════════════════════════════════════════
  // 텍스트 포맷팅 (밑줄 등)
  // ════════════════════════════════════════

  // ①②③④⑤ 번호만 강조
  function formatCircled(text) {
    if (!text) return '';
    return text.replace(/([①②③④⑤])/g, '<span class="num-mark">$1</span>');
  }

  // ①[표현] 형태를 번호+밑줄로 변환
  function formatCircledWithUnderline(text) {
    if (!text) return '';
    return text
      .replace(/([①②③④⑤])\s*\[([^\]]+)\]/g, '<span class="num-mark">$1</span><span class="underline-text">$2</span>')
      .replace(/([①②③④⑤])/g, '<span class="num-mark">$1</span>');
  }

  // [표현] 형태를 밑줄로 변환 (번호 없이)
  function formatBracketUnderline(text) {
    if (!text) return '';
    return text.replace(/\[([^\]]+)\]/g, '<span class="underline-text">$1</span>');
  }

  // 빈칸 _______ 시각화
  function formatBlank(text) {
    if (!text) return '';
    return text.replace(/_{3,}/g, '<span class="blank-mark"></span>');
  }

  // ════════════════════════════════════════
  // 선택형 정답 확인 (다시선택 버그 수정)
  // ════════════════════════════════════════
  window.selectOption = (div, idx) => {
    if (div.classList.contains('disabled')) return;
    // ⭐ 이전 선택 모두 제거 (selected, wrong, correct 클래스 다 정리)
    document.querySelectorAll('.opt').forEach(o => {
      if (!o.classList.contains('disabled')) {
        o.classList.remove('selected');
      }
    });
    div.classList.add('selected');
    selectedOptIdx = idx;
  };

  window.checkAnswer = () => {
    if (selectedOptIdx === null) { alert('답을 선택해주세요.'); return; }
    const q = questions[currentQIdx];
    const userAns = selectedOptIdx + 1;
    const correctAns = parseInt(q.answer);

    const opts = document.querySelectorAll('.opt');

    if (userAns === correctAns) {
      // 정답
      opts.forEach(o => o.classList.add('disabled'));
      opts[selectedOptIdx].classList.remove('selected');
      opts[selectedOptIdx].classList.add('correct');
      document.getElementById('res-correct').textContent = '✅ 정답이에요!';
      document.getElementById('res-correct').classList.add('show');
      showExplanation(q);
      correctCount++;
      proceedToNext();
    } else {
      wrongAttempts++;
      // ⭐ 틀린 선택지에 wrong 표시하고 disabled, 나머지는 그대로
      opts[selectedOptIdx].classList.remove('selected');
      opts[selectedOptIdx].classList.add('wrong');
      opts[selectedOptIdx].classList.add('disabled');

      if (wrongAttempts === 1) {
        document.getElementById('res-wrong1').textContent = '아쉬워요! 다시 한 번 생각해보세요.';
        document.getElementById('res-wrong1').classList.add('show');
        selectedOptIdx = null;
        // 버튼 그대로 (정답 확인 → 다시 클릭하면 새 선택지로 체크)
      } else {
        // 2번 틀림 — 오답 확정
        opts.forEach(o => o.classList.add('disabled'));
        opts[correctAns - 1]?.classList.add('correct');
        document.getElementById('res-wrong1').classList.remove('show');
        document.getElementById('res-wrong2').textContent = `정답은 ${correctAns}번이에요.`;
        document.getElementById('res-wrong2').classList.add('show');
        showExplanation(q);
        proceedToNext();
      }
    }
  };

  // ════════════════════════════════════════
  // 서답형
  // ════════════════════════════════════════
  window.checkShortAnswer = () => {
    const q = questions[currentQIdx];
    const fmt = q.format;
    let userAns = '';
    let modelAns = '';

    if (fmt === 'short_summary') {
      const a = document.getElementById('ans-a')?.value.trim() || '';
      const b = document.getElementById('ans-b')?.value.trim() || '';
      if (!a || !b) { alert('A, B 모두 입력해주세요.'); return; }
      userAns = `(A) ${a} / (B) ${b}`;
      modelAns = `(A) ${q.answer_a || ''} / (B) ${q.answer_b || ''}`;
    } else if (fmt === 'short_korean') {
      const a1 = document.getElementById('ans-1')?.value.trim() || '';
      const a2 = document.getElementById('ans-2')?.value.trim() || '';
      if (!a1 || !a2) { alert('이유 2가지 모두 입력해주세요.'); return; }
      userAns = `1) ${a1}\n2) ${a2}`;
      modelAns = `1) ${q.answer_1 || ''}\n2) ${q.answer_2 || ''}`;
    } else {
      userAns = document.getElementById('ans-write')?.value.trim() || '';
      if (!userAns) { alert('답을 입력해주세요.'); return; }
      modelAns = q.answer || '';
    }

    document.querySelectorAll('#q-input input, #q-input textarea').forEach(el => el.disabled = true);

    document.getElementById('res-wrong2').innerHTML = `
      <div style="font-weight:500;margin-bottom:6px">✏️ 모범답안과 비교해보세요.</div>
      <div style="font-size:11px;color:#5A7BAD;margin-top:6px;white-space:pre-line"><b>내 답:</b><br>${userAns}</div>
      <div style="font-size:11px;color:#3B6D11;margin-top:6px;white-space:pre-line"><b>모범답안:</b><br>${modelAns}</div>
    `;
    document.getElementById('res-wrong2').classList.add('show');
    showExplanation(q);

    // ✅ / ❌ 자가체크 버튼
    const area = document.getElementById('btn-area');
    area.innerHTML = `
      <div class="self-check-row">
        <button class="sc-correct" onclick="selfCheckResult(true)">✅ 맞췄어요</button>
        <button class="sc-wrong" onclick="selfCheckResult(false)">❌ 틀렸어요</button>
      </div>
    `;
  };

  window.selfCheckResult = (correct) => {
    if (correct) correctCount++;
    proceedToNext();
  };

  function showExplanation(q) {
    const el = document.getElementById('q-explanation');
    el.innerHTML = `<div class="exp-title">해설</div>${q.explanation || '(해설 없음)'}`;
    el.classList.add('show');
  }

  function proceedToNext() {
    const area = document.getElementById('btn-area');
    const isLast = currentQIdx === 1;
    area.innerHTML = `<button class="btn-main" id="btn-next">${isLast ? '결과 보기 →' : '다음 문제 →'}</button>`;
    document.getElementById('btn-next').onclick = () => {
      if (currentQIdx === 0) { currentQIdx = 1; renderCurrentQuestion(); }
      else finishRound();
    };
  }

  async function finishRound() {
    const today = new Date().toISOString().split('T')[0];
    try {
      const progressId = `${userId}_${passage.id}_${typeName}_${currentRound}_${today}`;
      await setDoc(doc(db, 'progress', progressId), {
        userId, passageId: passage.id, typeName,
        round: currentRound,
        correct: correctCount === 2,
        correctCount, totalQuestions: 2,
        date: today, createdAt: new Date().toISOString()
      });

      const summaryId = `${userId}_${passage.id}`;
      const sSnap = await getDoc(doc(db, 'progress_summary', summaryId));
      const existing = sSnap.exists() ? sSnap.data() : {};
      existing.userId = userId;
      existing.passageId = passage.id;
      existing[typeName] = { round: currentRound, correct: correctCount, date: today };
      await setDoc(doc(db, 'progress_summary', summaryId), existing);
    } catch(e) { console.error(e); }

    localStorage.setItem('lastResult', JSON.stringify({
      passageName: passage.name, typeName,
      round: currentRound, correctCount, totalQuestions: 2,
    }));
    window.location.href = 'result.html';
  }

  function showError(msg) {
    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('quiz-content').style.display   = 'none';
    document.getElementById('error-screen').style.display   = 'block';
    document.getElementById('error-msg').textContent        = msg;
  }
</script>

</body>
</html>
