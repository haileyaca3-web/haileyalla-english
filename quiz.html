<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>문제 풀기 — 헤일리올라</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="page">
  <div class="phone">
    <div class="top-bar with-back" style="justify-content:space-between">
      <button class="back-btn" onclick="goBackToTypes()">←</button>
      <div class="top-info">
        <div class="top-school" id="quiz-school">매산고</div>
        <div class="top-title" id="quiz-passage">지문</div>
      </div>
      <div style="width:34px"></div>
    </div>

    <div class="scroll-body" id="quiz-body">
      <div id="loading-screen" style="text-align:center;padding:40px 20px">
        <div style="font-size:13px;color:#1A3566;font-weight:500">문제 불러오는 중...</div>
        <div style="margin-top:16px;font-size:20px">⏳</div>
      </div>

      <div id="quiz-content" style="display:none">
        <div class="q-meta">
          <span class="q-type" id="q-type-label">유형</span>
          <span class="q-pts" id="q-pts-label">문제 1/2</span>
        </div>
        <div class="q-text" id="q-text"></div>
        <div id="q-display"></div>
        <div id="q-input"></div>
        <div class="result-box result-correct" id="res-correct"></div>
        <div class="result-box result-wrong1" id="res-wrong1"></div>
        <div class="result-box result-wrong2" id="res-wrong2"></div>
        <div class="explanation" id="q-explanation"></div>
        <div id="btn-area">
          <button class="btn-main" id="btn-check" onclick="checkAnswer()">정답 확인</button>
        </div>
        <div style="text-align:center;margin-top:14px;font-size:11px;color:#888780" id="access-count">1번 접속</div>
      </div>

      <div id="error-screen" style="display:none;text-align:center;padding:30px 20px">
        <div style="font-size:13px;color:#E24B4A;margin-bottom:8px" id="error-msg">문제를 불러올 수 없어요</div>
        <button class="btn-main" onclick="goBackToTypes()">유형 선택으로</button>
      </div>
    </div>
  </div>
</div>

<style>
.given-box { background:#FFF5E8; border:0.5px solid #E5B774; border-radius:8px; padding:10px 12px; margin-bottom:12px; font-size:14px; color:#854F0B; line-height:1.7; }
.given-box-title { font-size:11px; color:#A07020; font-weight:600; margin-bottom:4px; }
.passage-box { background:#fff; border:0.5px solid #D6E4FF; border-radius:8px; padding:12px; margin-bottom:12px; font-size:14px; color:#2C2C2A; line-height:1.9; }
.summary-box { background:#F5F8FF; border:0.5px solid #A8C4F5; border-radius:8px; padding:10px 12px; margin-bottom:12px; font-size:14px; color:#1A3566; line-height:1.7; font-style: italic; }
.para-box { background:#fff; border:0.5px solid #D6E4FF; border-radius:8px; padding:10px 12px; margin-bottom:6px; font-size:14px; color:#2C2C2A; line-height:1.8; }
.para-label { font-weight:600; color:#2B5EB8; margin-right:4px; }
.word-bank { background:#EEEDFE; border-radius:8px; padding:8px 12px; margin-bottom:8px; font-size:13px; color:#3C3489; }
.conditions-list { font-size:12px; color:#5A7BAD; margin-bottom:8px; line-height:1.7; }
.short-input-wrap { margin-bottom:8px; }
.short-input-wrap label { font-size:12px; color:#5A7BAD; display:block; margin-bottom:4px; }
.short-input-wrap input, .short-input-wrap textarea { width:100%; padding:9px 11px; border:0.5px solid #D6E4FF; border-radius:6px; font-size:14px; color:#2C2C2A; background:#fff; box-sizing:border-box; }
.short-input-wrap textarea { min-height:60px; resize:vertical; font-family:inherit; }
.opt-num-only { display:flex; align-items:center; justify-content:center; font-size:15px; font-weight:500; color:#2B5EB8; width:38px; height:38px; }
.passage-marked .num-mark { color:#2B5EB8; font-weight:600; font-size:16px; }
.passage-marked .underline-text { text-decoration: underline; text-underline-offset: 3px; text-decoration-thickness: 1.5px; font-weight: 500; }
.blank-mark { display: inline-block; min-width: 110px; border-bottom: 2px solid #2B5EB8; margin: 0 2px; }
.self-check-row { display:flex; gap:8px; margin-bottom:8px; }
.self-check-row button { flex:1; padding:11px; border-radius:8px; font-size:14px; font-weight:500; cursor:pointer; border:0.5px solid; }
.self-check-row .sc-correct { background:#EAF3DE; border-color:#A8D472; color:#27500A; }
.self-check-row .sc-wrong { background:#FFE4E4; border-color:#E5B774; color:#854F0B; }

.opt { position: relative; }
.opt.selected {
  background: #EBF2FF !important;
  border: 1.5px solid #2B5EB8 !important;
}
.opt.selected::after {
  content: "✓";
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: #2B5EB8;
  font-weight: 700;
  font-size: 18px;
}

.vocab-card {
  background:#fff; border:0.5px solid #D6E4FF; border-radius:8px;
  padding:11px 13px; margin-bottom:8px;
}
.vocab-card-header { font-size:12px; color:#5A7BAD; margin-bottom:4px; }
.vocab-card-word { font-size:14px; font-weight:500; color:#1A3566; margin-bottom:6px; }
.vocab-card-def { font-size:13px; color:#2C2C2A; line-height:1.6; }

/* 어휘빈칸 전용 */
.vocab-passage { line-height: 2.2; font-size: 15px; }
.vocab-blank {
  display: inline-block;
  background: #FFF5E8;
  border: 1.5px solid #E5B774;
  border-radius: 6px;
  padding: 2px 8px;
  margin: 0 2px;
  cursor: pointer;
  color: #854F0B;
  font-weight: 500;
  transition: all 0.15s;
}
.vocab-blank:hover { background: #FFE9CC; }
.vocab-blank.filled {
  background: #EBF2FF;
  border-color: #2B5EB8;
  color: #1A3566;
}
.vocab-blank.vocab-correct {
  background: #EAF3DE !important;
  border-color: #A8D472 !important;
  color: #27500A !important;
  cursor: default;
}
.vocab-blank.vocab-wrong {
  background: #FFE4E4 !important;
  border-color: #E5B774 !important;
  color: #854F0B !important;
  cursor: default;
}
.blank-line { display: inline-block; min-width: 50px; border-bottom: 1.5px solid #E5B774; }

.vocab-popup-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.5); z-index: 10000;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
}
.vocab-popup-inner {
  background: #fff; border-radius: 14px; padding: 20px;
  width: 100%; max-width: 340px;
}
.vocab-popup-title {
  font-size: 15px; font-weight: 600; color: #1A3566;
  margin-bottom: 14px; text-align: center;
}
.vocab-popup-choices {
  display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px;
}
.vocab-choice {
  background: #fff; border: 1.5px solid #D6E4FF; border-radius: 8px;
  padding: 11px 13px; font-size: 14px; color: #2C2C2A; cursor: pointer;
  text-align: left; transition: all 0.15s;
}
.vocab-choice:hover { background: #EBF2FF; border-color: #A8C4F5; }
.vocab-choice.selected {
  background: #EBF2FF; border-color: #2B5EB8; color: #1A3566; font-weight: 500;
}
.vocab-popup-cancel {
  width: 100%; background: #fff; color: #888780;
  border: 0.5px solid #D6E4FF; border-radius: 8px;
  padding: 10px; font-size: 13px; cursor: pointer;
}
</style>

<script type="module">
  import { auth, db } from './js/firebase.js';
  import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { collection, getDocs, query, where, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const school   = localStorage.getItem('selectedSchool') || '매산고_고2';
  const passage  = JSON.parse(localStorage.getItem('selectedPassage') || '{}');
  const typeName = localStorage.getItem('selectedType') || '';
  const userId   = localStorage.getItem('userId');

  let questions      = [];
  let currentQIdx    = 0;
  let accessCount    = 1;
  let correctCount   = 0;
  let wrongAttempts  = 0;
  let selectedOptIdx = null;
  let firstWrongIdx  = null;

  document.getElementById('quiz-school').textContent  = school.replace('_', ' ');
  document.getElementById('quiz-passage').textContent = passage.name || '지문';
  document.getElementById('q-type-label').textContent = typeName.replace(/_/g, ' ');

  window.goBackToTypes = () => {
    localStorage.setItem('keepPassage', 'true');
    window.location.href = 'passage.html';
  };

  onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = 'index.html'; return; }
    if (!passage.id || !typeName) { showError('지문 또는 유형 정보가 없어요.'); return; }
    await loadAccessCount();
    await loadQuestions();
  });

  async function loadAccessCount() {
    try {
      const snap = await getDoc(doc(db, 'progress_summary', `${userId}_${passage.id}`));
      if (snap.exists()) {
        const data = snap.data();
        const prevAccess = data[typeName]?.round || 0;
        accessCount = prevAccess + 1;
      }
    } catch(e) {}
    document.getElementById('access-count').textContent = `${accessCount}번 접속`;
  }

  async function loadQuestions() {
    try {
      const snap = await getDocs(
        query(collection(db, 'questions'),
          where('passageId', '==', passage.id),
          where('school',    '==', school),
          where('typeName',  '==', typeName)
        )
      );
      questions = [];
      snap.forEach(d => questions.push({ id: d.id, ...d.data() }));
      questions.sort((a, b) => (a.idx || 0) - (b.idx || 0));
      if (questions.length === 0) { showError('이 유형의 문제가 아직 없어요.'); return; }

      // 정답 위치 무작위화
      questions = questions.map(q => shuffleChoices(q));

      currentQIdx = 0;
      correctCount = 0;
      renderCurrentQuestion();
    } catch(e) { showError('문제 로딩 실패: ' + e.message); }
  }

  function shuffleChoices(q) {
    if (!q.choices || !q.choices.length || typeof q.answer !== 'number') return q;
    const correctAnswer = q.choices[q.answer - 1];
    const shuffled = [...q.choices];
    for (let i = shuffled.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
    }
    const newAnswer = shuffled.indexOf(correctAnswer) + 1;
    return { ...q, choices: shuffled, answer: newAnswer };
  }

  function stripParaPrefix(text, label) {
    if (!text) return '';
    const regex = new RegExp(`^\\s*\\(?${label}\\)?[\\s\\.:\\-]*`, 'i');
    return text.replace(regex, '').trim();
  }

  function renderCurrentQuestion() {
    const q = questions[currentQIdx];
    if (!q) { showError('문제 데이터가 없어요.'); return; }

    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('error-screen').style.display   = 'none';
    document.getElementById('quiz-content').style.display   = 'block';

    document.getElementById('q-pts-label').textContent = `문제 ${currentQIdx + 1}/2`;
    document.getElementById('q-text').textContent      = q.question || '';

    document.getElementById('res-correct').classList.remove('show');
    document.getElementById('res-wrong1').classList.remove('show');
    document.getElementById('res-wrong2').classList.remove('show');
    document.getElementById('q-explanation').classList.remove('show');

    const displayEl = document.getElementById('q-display');
    const inputEl   = document.getElementById('q-input');
    displayEl.innerHTML = '';
    inputEl.innerHTML = '';

    selectedOptIdx = null;
    wrongAttempts  = 0;
    firstWrongIdx  = null;

    renderByFormat(q, displayEl, inputEl);

    const cat = getCategoryByFormat(q.format);
    setupCheckButton(cat);
  }

  function getCategoryByFormat(fmt) {
    const choiceFormats = [
      'irrelevant','order','order_kana','summary_blank','summary_blank_3','insert',
      'word','grammar','grammar_2','grammar_correct','grammar_box','vocab_box',
      'blank','title','underline','match_kor','match_eng',
      'mood_change','atmosphere','main_idea_kor','main_idea_eng','main_idea_kor_selectable',
      'purpose','topic','chart','infer_set','connector',
      'reference','character','definition','unanswerable','infinitive_use',
      'vocab_book'
    ];
    const shortBlankFormats = ['short_blank_common','short_blank','short_blank_passage','short_blank_morph'];
    if (fmt === 'vocab_blank') return 'vocab_blank';
    if (choiceFormats.includes(fmt)) return 'choice';
    if (shortBlankFormats.includes(fmt)) return 'short_blank';
    return 'short';
  }

  function renderByFormat(q, displayEl, inputEl) {
    const fmt = q.format;

    if (fmt === 'irrelevant') {
      displayEl.innerHTML = `<div class="passage-box passage-marked">${formatCircled(q.passage_marked)}</div>`;
      renderNumberChoices(inputEl);
    }
    else if (fmt === 'order') {
      const a = stripParaPrefix(q.para_a, 'A');
      const b = stripParaPrefix(q.para_b, 'B');
      const c = stripParaPrefix(q.para_c, 'C');
      displayEl.innerHTML = `
        <div class="given-box"><div class="given-box-title">주어진 글</div>${q.given_text || ''}</div>
        <div class="para-box"><span class="para-label">(A)</span>${a}</div>
        <div class="para-box"><span class="para-label">(B)</span>${b}</div>
        <div class="para-box"><span class="para-label">(C)</span>${c}</div>
      `;
      renderTextChoices(inputEl, q.choices);
    }
    else if (fmt === 'order_kana') {
      const a = stripParaPrefix(q.para_a, 'A');
      const b = stripParaPrefix(q.para_b, 'B');
      const c = stripParaPrefix(q.para_c, 'C');
      displayEl.innerHTML = `
        <div class="given-box"><div class="given-box-title">(가)</div>${q.given_text_1 || ''}</div>
        <div class="para-box"><span class="para-label">(A)</span>${a}</div>
        <div class="para-box"><span class="para-label">(B)</span>${b}</div>
        <div class="para-box"><span class="para-label">(C)</span>${c}</div>
        <div class="given-box"><div class="given-box-title">(나)</div>${q.given_text_2 || ''}</div>
      `;
      renderTextChoices(inputEl, q.choices);
    }
    else if (fmt === 'summary_blank' || fmt === 'summary_blank_3') {
      displayEl.innerHTML = `
        <div class="passage-box">${q.passage_text || ''}</div>
        <div class="summary-box">${q.summary_template || ''}</div>
      `;
      renderTextChoices(inputEl, q.choices);
    }
    else if (fmt === 'insert') {
      displayEl.innerHTML = `
        <div class="given-box"><div class="given-box-title">주어진 문장</div>${q.given_sentence || ''}</div>
        <div class="passage-box passage-marked">${formatCircled(q.passage_marked)}</div>
      `;
      renderNumberChoices(inputEl);
    }
    else if (fmt === 'word' || fmt === 'grammar' || fmt === 'grammar_2' || fmt === 'grammar_correct') {
      displayEl.innerHTML = `<div class="passage-box passage-marked">${formatCircledWithUnderline(q.passage_marked)}</div>`;
      renderTextChoices(inputEl, q.choices);
    }
    else if (fmt === 'grammar_box' || fmt === 'vocab_box') {
      displayEl.innerHTML = `<div class="passage-box passage-marked">${q.passage_with_boxes || ''}</div>`;
      renderTextChoices(inputEl, q.choices);
    }
    else if (fmt === 'blank') {
      displayEl.innerHTML = `<div class="passage-box passage-marked">${formatBlank(q.passage_with_blank)}</div>`;
      renderTextChoices(inputEl, q.choices);
    }
    else if (fmt === 'title' || fmt === 'main_idea_kor' || fmt === 'main_idea_eng' || fmt === 'main_idea_kor_selectable' || fmt === 'purpose' || fmt === 'topic' || fmt === 'mood_change' || fmt === 'atmosphere' || fmt === 'character') {
      displayEl.innerHTML = `<div class="passage-box">${q.passage_text || ''}</div>`;
      renderTextChoices(inputEl, q.choices);
    }
    else if (fmt === 'underline') {
      displayEl.innerHTML = `<div class="passage-box passage-marked">${formatBracketUnderline(q.passage_with_underline)}</div>`;
      renderTextChoices(inputEl, q.choices);
    }
    else if (fmt === 'match_kor' || fmt === 'match_eng') {
      displayEl.innerHTML = `<div class="passage-box">${q.passage_text || ''}</div>`;
      renderTextChoices(inputEl, q.choices);
    }
    else if (fmt === 'chart') {
      displayEl.innerHTML = `<div class="passage-box">${q.chart_description || ''}</div>`;
      renderTextChoices(inputEl, q.choices);
    }
    else if (fmt === 'infer_set') {
      let html = `<div class="passage-box">${q.passage_text || ''}</div>`;
      if (q.options_set) {
        html += `<div class="word-bank"><b>&lt;보기&gt;</b><br>${q.options_set.map((o,i)=>String.fromCharCode(97+i)+'. '+o).join('<br>')}</div>`;
      }
      displayEl.innerHTML = html;
      renderTextChoices(inputEl, q.choices);
    }
    else if (fmt === 'connector') {
      displayEl.innerHTML = `<div class="passage-box passage-marked">${formatBlank(q.passage_with_blanks)}</div>`;
      renderTextChoices(inputEl, q.choices);
    }
    else if (fmt === 'reference') {
      displayEl.innerHTML = `<div class="passage-box">${q.passage_with_refs || ''}</div>`;
      renderTextChoices(inputEl, q.choices);
    }
    else if (fmt === 'definition') {
      let html = `<div class="passage-box">${q.passage_text || ''}</div>`;
      if (q.definitions) {
        q.definitions.forEach((d, i) => {
          const num = ['①','②','③','④','⑤'][i];
          html += `<div class="vocab-card">
            <div class="vocab-card-header">${num} 단어</div>
            <div class="vocab-card-word">${d.word}</div>
            <div class="vocab-card-def">${d.def}</div>
          </div>`;
        });
      }
      displayEl.innerHTML = html;
      renderNumberChoices(inputEl);
    }
    else if (fmt === 'unanswerable') {
      displayEl.innerHTML = `<div class="passage-box">${q.passage_text || ''}</div>`;
      renderTextChoices(inputEl, q.choices);
    }
    else if (fmt === 'infinitive_use') {
      displayEl.innerHTML = `<div class="passage-box passage-marked">${formatBracketUnderline(q.passage_with_underline)}</div>`;
      renderTextChoices(inputEl, q.choices);
    }
    else if (fmt === 'vocab_book') {
      let html = '';
      if (q.passage_text) html += `<div class="passage-box">${q.passage_text}</div>`;
      if (q.question_detail) html += `<div class="given-box"><div class="given-box-title">문제</div>${q.question_detail}</div>`;
      displayEl.innerHTML = html;
      renderTextChoices(inputEl, q.choices);
    }
    else if (fmt === 'vocab_blank') {
      // 어휘빈칸 - 한 화면에 5개 빈칸 다 표시
      renderVocabBlanks(q, displayEl, inputEl);
    }

    // 단답형
    else if (fmt === 'short_blank_common' || fmt === 'short_blank' || fmt === 'short_blank_passage' || fmt === 'short_blank_morph') {
      displayEl.innerHTML = `<div class="passage-box passage-marked">${formatBlank(q.passage_with_blank || q.passage_with_blanks || '')}</div>`;
      let hint = '';
      if (fmt === 'short_blank_common') hint = '두 빈칸에 공통으로 들어갈 영어 한 단어';
      else if (fmt === 'short_blank_passage') hint = '본문에서 찾기';
      else if (fmt === 'short_blank_morph') hint = '본문에서 찾되 형태 변형 가능';
      else hint = '영어 한 단어';
      inputEl.innerHTML = `<div class="short-input-wrap"><label>${hint}</label><input type="text" id="ans-single" placeholder="한 단어"></div>`;
    }

    // 서답형 (기존)
    else if (fmt === 'short_summary') {
      displayEl.innerHTML = `
        <div class="passage-box">${q.passage_text || ''}</div>
        <div class="summary-box">${q.summary_template || ''}</div>
      `;
      inputEl.innerHTML = `
        <div class="short-input-wrap"><label>(A) — 영어 2단어</label><input type="text" id="ans-a"></div>
        <div class="short-input-wrap"><label>(B) — 영어 2단어</label><input type="text" id="ans-b"></div>
      `;
    }
    else if (fmt === 'short_korean') {
      displayEl.innerHTML = `<div class="passage-box">${q.passage_text || ''}</div>`;
      let count = q.answer_count || 2;
      let html = '';
      for (let i = 1; i <= count; i++) {
        html += `<div class="short-input-wrap"><label>이유 ${i}</label><textarea id="ans-${i}"></textarea></div>`;
      }
      inputEl.innerHTML = html;
    }
    else if (fmt === 'short_translate') {
      let html = `<div class="passage-box passage-marked">${formatBracketUnderline(q.passage_with_korean)}</div>`;
      if (q.word_bank?.length) html += `<div class="word-bank"><b>보기:</b> ${q.word_bank.join(' / ')}</div>`;
      if (q.conditions?.length) html += `<div class="conditions-list"><b>조건:</b><br>${q.conditions.map((c,i)=>`${i+1}. ${c}`).join('<br>')}</div>`;
      displayEl.innerHTML = html;
      inputEl.innerHTML = `<div class="short-input-wrap"><label>영작</label><textarea id="ans-write"></textarea></div>`;
    }
    else if (fmt === 'short_arrange') {
      let html = `<div class="passage-box">${q.passage_text || ''}</div>`;
      if (q.scrambled_words?.length) html += `<div class="word-bank"><b>단어:</b> ${q.scrambled_words.join(' / ')}</div>`;
      displayEl.innerHTML = html;
      inputEl.innerHTML = `<div class="short-input-wrap"><label>배열한 문장</label><textarea id="ans-write"></textarea></div>`;
    }

    // 일반 서답형
    else {
      let html = '';
      if (q.passage_text) html += `<div class="passage-box">${q.passage_text}</div>`;
      if (q.passage_with_underline) html = `<div class="passage-box passage-marked">${formatBracketUnderline(q.passage_with_underline)}</div>`;
      if (q.passage_with_blank) html = `<div class="passage-box passage-marked">${formatBlank(q.passage_with_blank)}</div>`;
      if (q.korean_sentence) html += `<div class="given-box"><div class="given-box-title">한국어</div>${q.korean_sentence}</div>`;
      if (q.sub_question) html += `<div class="given-box"><div class="given-box-title">질문</div>${q.sub_question}</div>`;
      if (q.start_phrase) html += `<div class="given-box"><div class="given-box-title">시작어구</div>"${q.start_phrase}"...</div>`;
      if (q.word_bank?.length) html += `<div class="word-bank"><b>보기:</b> ${q.word_bank.join(' / ')}</div>`;
      if (q.summary_template) html += `<div class="summary-box">${q.summary_template}</div>`;
      if (q.conditions?.length) html += `<div class="conditions-list"><b>조건:</b><br>${q.conditions.map((c,i)=>`${i+1}. ${c}`).join('<br>')}</div>`;
      displayEl.innerHTML = html;
      const label = fmt.includes('한국어') || fmt === 'short_underline_kor' ? '한국어 서술' : '영작';
      inputEl.innerHTML = `<div class="short-input-wrap"><label>${label}</label><textarea id="ans-write"></textarea></div>`;
    }
  }

  function setupCheckButton(category) {
    const area = document.getElementById('btn-area');
    let label = '정답 확인';
    let handler = checkAnswer;
    if (category === 'short_blank') { label = '제출'; handler = checkShortBlank; }
    else if (category === 'short') { label = '제출'; handler = checkShortAnswer; }
    else if (category === 'vocab_blank') { label = '제출'; handler = checkVocabBlanks; }
    area.innerHTML = `<button class="btn-main" id="btn-check">${label}</button>`;
    document.getElementById('btn-check').onclick = handler;
  }

  // ===== 어휘빈칸 전용 =====
  let vocabAnswers = {}; // {1: '단어', 2: '단어', ...}
  let currentVocabIdx = null;

  function renderVocabBlanks(q, displayEl, inputEl) {
    vocabAnswers = {};
    const totalBlanks = (q.blanks || []).length;

    let passageHtml = q.passage_with_blanks || '';
    // (1) (2) (3) (4) (5)를 클릭 가능한 빈칸으로 변환
    passageHtml = passageHtml.replace(/\((\d+)\)/g, (m, num) => {
      return `<span class="vocab-blank" data-num="${num}" onclick="openVocabPopup(${num})">(${num}) <span class="blank-line">_____</span></span>`;
    });

    displayEl.innerHTML = `
      <div style="background:#FFF5E8;border-radius:8px;padding:9px 12px;margin-bottom:12px;font-size:12px;color:#854F0B;line-height:1.5">
        💡 각 빈칸을 클릭해서 단어를 선택하세요. 총 ${totalBlanks}개
      </div>
      <div class="passage-box vocab-passage" id="vocab-passage-display">${passageHtml}</div>
      <div id="vocab-status" style="text-align:center;font-size:13px;color:#5A7BAD;margin-top:8px">
        진행: <span id="vocab-progress">0</span> / ${totalBlanks}
      </div>
    `;
    inputEl.innerHTML = '';
  }

  window.openVocabPopup = (num) => {
    const q = questions[currentQIdx];
    const blank = (q.blanks || []).find(b => b.num === parseInt(num));
    if (!blank) return;
    currentVocabIdx = num;

    // 기존 팝업 제거
    const existing = document.getElementById('vocab-popup');
    if (existing) existing.remove();

    const currentAnswer = vocabAnswers[num];
    const choices = blank.choices || [];

    const popup = document.createElement('div');
    popup.id = 'vocab-popup';
    popup.className = 'vocab-popup-overlay';
    popup.innerHTML = `
      <div class="vocab-popup-inner">
        <div class="vocab-popup-title">(${num}) 빈칸에 알맞은 단어</div>
        <div class="vocab-popup-choices">
          ${choices.map((c, i) => {
            const nums = ['①','②','③','④'];
            const sel = currentAnswer === c ? 'selected' : '';
            return `<button class="vocab-choice ${sel}" onclick="selectVocabAnswer(${num},'${c}')">${nums[i]} ${c}</button>`;
          }).join('')}
        </div>
        <button class="vocab-popup-cancel" onclick="closeVocabPopup()">취소</button>
      </div>
    `;
    document.body.appendChild(popup);
  };

  window.selectVocabAnswer = (num, answer) => {
    vocabAnswers[num] = answer;
    closeVocabPopup();
    updateVocabDisplay();
  };

  window.closeVocabPopup = () => {
    const p = document.getElementById('vocab-popup');
    if (p) p.remove();
  };

  function updateVocabDisplay() {
    const q = questions[currentQIdx];
    const passage = document.getElementById('vocab-passage-display');
    if (!passage) return;

    // 빈칸들 업데이트
    document.querySelectorAll('.vocab-blank').forEach(el => {
      const num = parseInt(el.dataset.num);
      const ans = vocabAnswers[num];
      if (ans) {
        el.classList.add('filled');
        el.innerHTML = `(${num}) <b>${ans}</b>`;
      } else {
        el.classList.remove('filled');
        el.innerHTML = `(${num}) <span class="blank-line">_____</span>`;
      }
    });

    // 진행 상황
    const totalBlanks = (q.blanks || []).length;
    const filled = Object.keys(vocabAnswers).length;
    const prog = document.getElementById('vocab-progress');
    if (prog) prog.textContent = filled;
  }

  window.checkVocabBlanks = () => {
    const q = questions[currentQIdx];
    const blanks = q.blanks || [];

    if (Object.keys(vocabAnswers).length < blanks.length) {
      alert(`모든 빈칸을 채워주세요. (${Object.keys(vocabAnswers).length}/${blanks.length})`);
      return;
    }

    let correct = 0;
    const results = [];
    blanks.forEach(b => {
      const user = vocabAnswers[b.num];
      const ok = user === b.answer;
      if (ok) correct++;
      results.push({ num: b.num, user, answer: b.answer, ok });
    });

    // 화면에 결과 표시
    document.querySelectorAll('.vocab-blank').forEach(el => {
      const num = parseInt(el.dataset.num);
      const r = results.find(x => x.num === num);
      if (r) {
        el.classList.remove('filled');
        if (r.ok) {
          el.classList.add('vocab-correct');
          el.innerHTML = `(${num}) <b>${r.user}</b> ✓`;
        } else {
          el.classList.add('vocab-wrong');
          el.innerHTML = `(${num}) <b style="text-decoration:line-through">${r.user||''}</b> → <b>${r.answer}</b>`;
        }
      }
      el.onclick = null;
    });

    // 결과 메시지
    const allCorrect = correct === blanks.length;
    if (allCorrect) {
      document.getElementById('res-correct').textContent = `✅ 다 맞췄어요! (${correct}/${blanks.length})`;
      document.getElementById('res-correct').classList.add('show');
      correctCount++;
    } else {
      document.getElementById('res-wrong2').innerHTML = `📊 결과: ${correct}/${blanks.length} 맞췄어요. 위에서 확인해보세요.`;
      document.getElementById('res-wrong2').classList.add('show');
    }

    showExplanation(q);
    proceedToNext();
  };


  function renderNumberChoices(container) {
    const nums = ['①','②','③','④','⑤'];
    let html = '<div class="options">';
    nums.forEach((n, i) => {
      html += `<div class="opt" onclick="selectOption(this,${i})"><div class="opt-num-only">${n}</div></div>`;
    });
    html += '</div>';
    container.innerHTML = html;
  }

  function renderTextChoices(container, choices) {
    if (!choices || !choices.length) {
      container.innerHTML = '<div style="font-size:13px;color:#E24B4A">선택지가 없어요</div>';
      return;
    }
    const nums = ['①','②','③','④','⑤'];
    let html = '<div class="options">';
    choices.forEach((c, i) => {
      const clean = String(c).replace(/^[①②③④⑤]\s*/, '').replace(/^[1-5][\.\)]\s*/, '');
      html += `<div class="opt" onclick="selectOption(this,${i})">
        <div class="opt-num">${nums[i] || (i+1)}</div>
        <span>${clean}</span>
      </div>`;
    });
    html += '</div>';
    container.innerHTML = html;
  }

  function formatCircled(text) {
    if (!text) return '';
    return text.replace(/([①②③④⑤])/g, '<span class="num-mark">$1</span>');
  }
  function formatCircledWithUnderline(text) {
    if (!text) return '';
    return text
      .replace(/([①②③④⑤])\s*\[([^\]]+)\]/g, '<span class="num-mark">$1</span><span class="underline-text">$2</span>')
      .replace(/([①②③④⑤])/g, '<span class="num-mark">$1</span>');
  }
  function formatBracketUnderline(text) {
    if (!text) return '';
    return text.replace(/\[([^\]]+)\]/g, '<span class="underline-text">$1</span>');
  }
  function formatBlank(text) {
    if (!text) return '';
    return text.replace(/_{3,}/g, '<span class="blank-mark"></span>');
  }

  window.selectOption = (div, idx) => {
    if (div.classList.contains('disabled')) return;
    document.querySelectorAll('.opt').forEach(o => {
      if (!o.classList.contains('disabled')) {
        o.classList.remove('selected');
      }
    });
    div.classList.add('selected');
    selectedOptIdx = idx;
  };

  window.checkAnswer = () => {
    if (selectedOptIdx === null) { alert('답을 선택해주세요.'); return; }
    const q = questions[currentQIdx];
    const userAns = selectedOptIdx + 1;
    let correctAns;
    
    // 어법_2개는 배열
    if (Array.isArray(q.answer)) {
      // 일단 첫 답만 비교 (단순화)
      correctAns = q.answer[0];
    } else {
      correctAns = parseInt(q.answer);
    }

    const opts = document.querySelectorAll('.opt');

    if (userAns === correctAns) {
      opts.forEach(o => o.classList.add('disabled'));
      opts[selectedOptIdx].classList.add('correct');
      document.getElementById('res-correct').textContent = '✅ 정답이에요!';
      document.getElementById('res-correct').classList.add('show');
      showExplanation(q);
      correctCount++;
      proceedToNext();
    } else {
      wrongAttempts++;

      if (wrongAttempts === 1) {
        firstWrongIdx = selectedOptIdx;
        opts[selectedOptIdx].classList.add('disabled');
        opts[selectedOptIdx].classList.remove('selected');
        const optLabel = ['①','②','③','④','⑤'][selectedOptIdx];
        document.getElementById('res-wrong1').innerHTML = `❌ <b>${optLabel}번</b>은 오답이에요. 다시 한 번 골라보세요.`;
        document.getElementById('res-wrong1').classList.add('show');
        selectedOptIdx = null;
      } else {
        opts.forEach(o => o.classList.add('disabled'));
        opts[selectedOptIdx].classList.remove('selected');
        opts[correctAns - 1]?.classList.add('correct');
        document.getElementById('res-wrong1').classList.remove('show');
        document.getElementById('res-wrong2').textContent = `정답은 ${correctAns}번이에요.`;
        document.getElementById('res-wrong2').classList.add('show');
        showExplanation(q);
        proceedToNext();
      }
    }
  };

  window.checkShortBlank = () => {
    const userAns = (document.getElementById('ans-single')?.value || '').trim();
    if (!userAns) { alert('답을 입력해주세요.'); return; }
    const q = questions[currentQIdx];
    const modelAns = (q.answer || '').toString().trim();

    document.querySelectorAll('#q-input input').forEach(el => el.disabled = true);

    const isCorrect = userAns.toLowerCase() === modelAns.toLowerCase();
    if (isCorrect) {
      document.getElementById('res-correct').textContent = '✅ 정답이에요!';
      document.getElementById('res-correct').classList.add('show');
      correctCount++;
    } else {
      document.getElementById('res-wrong2').innerHTML = `❌ 정답: <b>${modelAns}</b><br><span style="font-size:11px">내 답: ${userAns}</span>`;
      document.getElementById('res-wrong2').classList.add('show');
    }
    showExplanation(q);
    proceedToNext();
  };

  window.checkShortAnswer = () => {
    const q = questions[currentQIdx];
    const fmt = q.format;
    let userAns = '';
    let modelAns = '';

    if (fmt === 'short_summary') {
      const a = document.getElementById('ans-a')?.value.trim() || '';
      const b = document.getElementById('ans-b')?.value.trim() || '';
      if (!a || !b) { alert('A, B 모두 입력해주세요.'); return; }
      userAns = `(A) ${a} / (B) ${b}`;
      modelAns = `(A) ${q.answer_a || ''} / (B) ${q.answer_b || ''}`;
    } else if (fmt === 'short_korean') {
      const count = q.answer_count || 2;
      let userArr = [], modelArr = [];
      for (let i = 1; i <= count; i++) {
        const v = document.getElementById(`ans-${i}`)?.value.trim() || '';
        if (!v) { alert(`이유 ${count}가지 모두 입력해주세요.`); return; }
        userArr.push(`${i}) ${v}`);
        modelArr.push(`${i}) ${q[`answer_${i}`] || ''}`);
      }
      userAns = userArr.join('\n');
      modelAns = modelArr.join('\n');
    } else {
      userAns = document.getElementById('ans-write')?.value.trim() || '';
      if (!userAns) { alert('답을 입력해주세요.'); return; }
      modelAns = q.answer || '';
    }

    document.querySelectorAll('#q-input input, #q-input textarea').forEach(el => el.disabled = true);

    document.getElementById('res-wrong2').innerHTML = `
      <div style="font-weight:500;margin-bottom:6px">✏️ 모범답안과 비교해보세요.</div>
      <div style="font-size:12px;color:#5A7BAD;margin-top:6px;white-space:pre-line"><b>내 답:</b><br>${userAns}</div>
      <div style="font-size:12px;color:#3B6D11;margin-top:6px;white-space:pre-line"><b>모범답안:</b><br>${modelAns}</div>
    `;
    document.getElementById('res-wrong2').classList.add('show');
    showExplanation(q);

    const area = document.getElementById('btn-area');
    area.innerHTML = `
      <div class="self-check-row">
        <button class="sc-correct" onclick="selfCheckResult(true)">✅ 맞췄어요</button>
        <button class="sc-wrong" onclick="selfCheckResult(false)">❌ 틀렸어요</button>
      </div>
    `;
  };

  window.selfCheckResult = (correct) => {
    if (correct) correctCount++;
    proceedToNext();
  };

  function showExplanation(q) {
    const el = document.getElementById('q-explanation');
    el.innerHTML = `<div class="exp-title">해설</div>${q.explanation || '(해설 없음)'}`;
    el.classList.add('show');
  }

  function proceedToNext() {
    const area = document.getElementById('btn-area');
    const isLast = currentQIdx === 1;
    area.innerHTML = `<button class="btn-main" id="btn-next">${isLast ? '결과 보기 →' : '다음 문제 →'}</button>`;
    document.getElementById('btn-next').onclick = () => {
      if (currentQIdx === 0) { currentQIdx = 1; renderCurrentQuestion(); }
      else finishRound();
    };
  }

  async function finishRound() {
    const today = new Date().toISOString().split('T')[0];
    try {
      const progressId = `${userId}_${passage.id}_${typeName}_${accessCount}_${today}`;
      await setDoc(doc(db, 'progress', progressId), {
        userId, passageId: passage.id, typeName,
        accessCount: accessCount,
        round: accessCount, // 호환용
        correct: correctCount === 2,
        correctCount, totalQuestions: 2,
        date: today,
        passageName: passage.name,
        textbook: passage.textbook,
        unit: passage.unit,
        num: passage.num,
        createdAt: new Date().toISOString()
      });

      const summaryId = `${userId}_${passage.id}`;
      const sSnap = await getDoc(doc(db, 'progress_summary', summaryId));
      const existing = sSnap.exists() ? sSnap.data() : {};
      existing.userId = userId;
      existing.passageId = passage.id;
      existing.passageName = passage.name;
      existing.textbook = passage.textbook;
      existing.unit = passage.unit;
      existing.num = passage.num;
      existing[typeName] = { round: accessCount, correct: correctCount, date: today };
      await setDoc(doc(db, 'progress_summary', summaryId), existing);
    } catch(e) { console.error(e); }

    localStorage.setItem('lastResult', JSON.stringify({
      passageName: passage.name, typeName,
      round: accessCount, correctCount, totalQuestions: 2,
    }));
    window.location.href = 'result.html';
  }

  function showError(msg) {
    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('quiz-content').style.display   = 'none';
    document.getElementById('error-screen').style.display   = 'block';
    document.getElementById('error-msg').textContent        = msg;
  }
</script>

</body>
