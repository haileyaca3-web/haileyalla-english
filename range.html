<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>범위 선택 — 헤일리올라</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="page">
  <div class="phone">
    <div class="top-bar with-back">
      <button class="back-btn" onclick="window.location.href='home.html'">←</button>
      <div class="top-info">
        <div class="top-school" id="school-label">매산고등학교</div>
        <div class="top-title">시험 범위 선택</div>
      </div>
    </div>
    <div class="scroll-body">

      <div class="selected-bar">
        <div class="selected-text">선택된 범위</div>
        <div class="selected-count" id="cnt">0개</div>
      </div>

      <div id="range-list">
        <div style="text-align:center;padding:30px;font-size:13px;color:#888780">
          범위 불러오는 중...
        </div>
      </div>

      <button class="btn-main" id="btn-next" style="margin-top:14px" disabled onclick="goNext()">
        문제 풀기 시작
      </button>
    </div>
  </div>
</div>

<script type="module">
  import { auth, db } from './js/firebase.js';
  import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const school  = localStorage.getItem('selectedSchool') || '매산고';
  const selected = new Set();

  document.getElementById('school-label').textContent = school + '등학교';

  onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = 'index.html'; return; }
    await loadRanges();
  });

  async function loadRanges() {
    const listEl = document.getElementById('range-list');

    try {
      // Firebase에서 해당 학교 지문 불러와서 범위 자동 추출
      const snap = await getDocs(
        query(collection(db, 'passages'),
          where('school', 'in', [school, '전체'])
        )
      );

      // 범위별로 그룹핑
      const rangeMap = {}; // { '리딩마스터_11강': { textbook, unit, count } }
      snap.forEach(d => {
        const p = d.data();
        const key = p.range; // 예: '리딩마스터_11강'
        if (!rangeMap[key]) {
          rangeMap[key] = { textbook: p.textbook, unit: p.unit, count: 0 };
        }
        rangeMap[key].count++;
      });

      if (Object.keys(rangeMap).length === 0) {
        listEl.innerHTML = `
          <div style="text-align:center;padding:30px;font-size:13px;color:#888780;line-height:1.8">
            저장된 지문이 없어요.<br>
            <span style="font-size:11px">관리자 화면에서 지문을 먼저 추가해주세요.</span>
          </div>`;
        return;
      }

      // 교재별로 그룹핑
      const byTextbook = {};
      Object.entries(rangeMap).forEach(([key, val]) => {
        if (!byTextbook[val.textbook]) byTextbook[val.textbook] = [];
        byTextbook[val.textbook].push({ key, ...val });
      });

      // 교재 순서 정렬
      const order = ['교과서', '리딩마스터', '리뷰', '모의고사'];
      const sorted = Object.entries(byTextbook).sort(
        ([a], [b]) => order.indexOf(a) - order.indexOf(b)
      );

      let html = '';
      sorted.forEach(([textbook, ranges]) => {
        const iconMap = { '교과서':'📖', '리딩마스터':'📔', '리뷰':'📝', '모의고사':'📄' };
        const colorMap = {
          '교과서':'#EBF2FF', '리딩마스터':'#EEEDFE',
          '리뷰':'#FFF5E8', '모의고사':'#E6F1FB'
        };
        const badgeMap = {
          '교과서':'ib-blue', '리딩마스터':'ib-purple',
          '리뷰':'ib-amber', '모의고사':'ib-blue'
        };

        const unitLabel = ranges.map(r => r.unit).join('·');
        const catId = 'cat-' + textbook;

        html += `
          <div class="section-label">${textbook}</div>
          <div class="cat-card">
            <div class="cat-header" onclick="toggle('${catId}')">
              <div class="cat-icon" style="background:${colorMap[textbook]||'#EBF2FF'}">${iconMap[textbook]||'📄'}</div>
              <div class="cat-info">
                <div class="cat-name">${textbook}</div>
                <div class="cat-sub">${unitLabel}</div>
              </div>
              <span class="cat-arrow" id="arr-${catId}">▼</span>
            </div>
            <div class="cat-items" id="${catId}">`;

        ranges.sort((a,b) => a.unit.localeCompare(b.unit, 'ko')).forEach(r => {
          html += `
              <div class="item-row" onclick="toggleItem(this,'${r.key}')">
                <div class="item-check">✓</div>
                <div class="item-name">${r.unit} (${r.count}개 지문)</div>
                <span class="item-badge ${badgeMap[textbook]||'ib-blue'}">${r.unit}</span>
              </div>`;
        });

        html += `</div></div>`;
      });

      listEl.innerHTML = html;

      // 첫 번째 카드 자동 열기
      const firstKey = 'cat-' + sorted[0][0];
      toggle(firstKey);

    } catch(e) {
      listEl.innerHTML = '<div style="text-align:center;padding:20px;font-size:12px;color:#E24B4A">범위를 불러오지 못했어요</div>';
      console.error(e);
    }
  }

  window.toggle = (id) => {
    const el  = document.getElementById(id);
    const arr = document.getElementById('arr-' + id);
    if (!el) return;
    const isOpen = el.classList.contains('open');
    el.classList.toggle('open', !isOpen);
    arr.textContent = isOpen ? '▼' : '▲';
  };

  window.toggleItem = (row, key) => {
    const check = row.querySelector('.item-check');
    const isOn  = check.classList.contains('on');
    check.classList.toggle('on', !isOn);
    check.style.color       = isOn ? 'transparent' : '#fff';
    check.style.background  = isOn ? '#fff' : '#1A3566';
    check.style.borderColor = isOn ? '#A8C4F5' : '#1A3566';
    if (!isOn) selected.add(key);
    else selected.delete(key);
    document.getElementById('cnt').textContent = selected.size + '개';
    document.getElementById('btn-next').disabled = selected.size === 0;
  };

  window.goNext = () => {
    if (selected.size === 0) return;
    localStorage.setItem('selectedRanges', JSON.stringify([...selected]));
    window.location.href = 'passage.html';
  };
</script>

</body>
</html>
