<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관리자 — 헤일리올라</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="page" id="page-admin-login">
  <div class="phone">
    <div class="top-bar">
      <div class="top-title">선생님 로그인</div>
      <div class="top-sub">관리자 전용 페이지</div>
    </div>
    <div class="body">
      <div class="field-wrap">
        <div class="field-label">이메일</div>
        <input type="text" id="admin-id" placeholder="이메일 주소">
      </div>
      <div class="field-wrap">
        <div class="field-label">비밀번호</div>
        <input type="password" id="admin-pw" placeholder="비밀번호">
      </div>
      <div class="error-msg" id="admin-error"></div>
      <button class="btn-main" onclick="adminLogin()">로그인</button>
      <div class="divider"></div>
      <button class="btn-sub" onclick="window.location.href='index.html'">학생 로그인으로</button>
    </div>
  </div>
</div>

<div class="page hidden" id="page-admin-main">
  <div class="phone">
    <div class="top-bar with-back" style="justify-content:space-between">
      <div class="top-info">
        <div class="top-school">관리자</div>
        <div class="top-title">헤일리올라 영어학원</div>
      </div>
      <button class="btn-logout" onclick="adminLogout()">로그아웃</button>
    </div>

    <div style="background:#fff;padding:0 14px">
      <div class="tab-row" style="margin-bottom:0;border-bottom:0.5px solid #D6E4FF">
        <div class="tab on" onclick="switchTab('approve')"  id="tab-approve">승인</div>
        <div class="tab"    onclick="switchTab('passages')" id="tab-passages">지문</div>
        <div class="tab"    onclick="switchTab('records')"  id="tab-records">기록</div>
        <div class="tab"    onclick="switchTab('settings')" id="tab-settings">설정</div>
      </div>
    </div>

    <div class="scroll-body" id="section-approve">
      <div class="section-label">승인 대기 중</div>
      <div id="pending-list"><div class="empty-msg">대기 중인 학생이 없어요</div></div>
      <div class="divider"></div>
      <div class="section-label">승인된 학생</div>
      <div id="approved-list"><div class="empty-msg">승인된 학생이 없어요</div></div>
    </div>

    <div class="scroll-body hidden" id="section-passages">
      <div class="section-label">교재 선택</div>
      <div class="field-wrap">
        <select id="p-textbook" onchange="updateUnitOptions()">
          <option value="">교재를 선택하세요</option>
          <option value="교과서">교과서 (동아 박용예)</option>
          <option value="리딩마스터">리딩마스터</option>
          <option value="리뷰">리뷰 모의고사</option>
          <option value="모의고사">모의고사</option>
        </select>
      </div>
      <div class="field-wrap">
        <div class="field-label">강/회차/과</div>
        <select id="p-unit"><option value="">교재를 먼저 선택하세요</option></select>
      </div>
      <div class="field-wrap">
        <div class="field-label">어느 학교가 사용?</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;padding:4px 0">
          <label class="school-check"><input type="checkbox" class="p-school-cb" value="매산고"> 매산고</label>
          <label class="school-check"><input type="checkbox" class="p-school-cb" value="효천고"> 효천고</label>
          <label class="school-check"><input type="checkbox" class="p-school-cb" value="복성고"> 복성고</label>
        </div>
      </div>

      <div class="section-label" style="margin-top:4px">지문 전체 붙여넣기</div>
      <div style="font-size:11px;color:#5A7BAD;margin-bottom:8px;line-height:1.6">
        지문 번호(01, 02...)를 기준으로 자동 분리돼요. 각주는 *로 시작.
      </div>
      <textarea id="p-text"
        style="width:100%;min-height:200px;padding:10px 12px;border-radius:8px;border:0.5px solid #D6E4FF;font-size:13px;line-height:1.8;resize:vertical;background:#fff;color:#2C2C2A"
        placeholder="01&#10;It's remarkable that..."></textarea>

      <div class="error-msg" id="p-error"></div>
      <div id="p-preview" style="display:none;background:#EBF2FF;border:0.5px solid #A8C4F5;border-radius:8px;padding:10px 12px;margin-bottom:10px;font-size:12px;color:#1A3566;line-height:1.6"></div>

      <div style="display:flex;gap:8px;margin-top:4px">
        <button class="btn-sub" style="flex:1" onclick="previewPassages()">미리보기</button>
        <button class="btn-main" style="flex:1" id="btn-save-passages" onclick="savePassages()" disabled>Firebase 저장</button>
      </div>

      <div class="divider"></div>

      <div class="section-label">📚 강별 문제 생성</div>
      <div class="field-wrap">
        <select id="filter-textbook" onchange="loadUnitList()">
          <option value="">교재 선택</option>
          <option value="교과서">교과서</option>
          <option value="리딩마스터">리딩마스터</option>
          <option value="리뷰">리뷰</option>
          <option value="모의고사">모의고사</option>
        </select>
      </div>
      <div id="unit-list"><div class="empty-msg">교재를 선택하세요</div></div>
    </div>

    <div class="scroll-body hidden" id="section-records">
      <div class="section-label">학생별 주간 기록</div>
      <div id="records-list"><div class="empty-msg">기록이 없어요</div></div>
    </div>

    <div class="scroll-body hidden" id="section-settings">
      <div class="section-label">🔑 Claude API 키</div>
      <div class="field-wrap">
        <div class="field-label">API 키</div>
        <input type="password" id="api-key-input" placeholder="sk-ant-api03-...">
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn-sub" style="flex:1" onclick="toggleApiKeyView()">보기/숨김</button>
        <button class="btn-main" style="flex:1" onclick="saveApiKey()">저장</button>
      </div>
      <div id="api-key-status" style="margin-top:10px;font-size:11px;color:#888780"></div>
      <div class="divider"></div>
      <div class="section-label">🗑️ 위험 작업</div>
      <button class="btn-sub" style="background:#FFE4E4;color:#E24B4A;border-color:#E24B4A" onclick="deleteAllQuestions()">모든 문제 삭제</button>
    </div>
  </div>
</div>

<style>
.btn-logout{background:rgba(255,255,255,0.12);color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer}
.empty-msg{font-size:12px;color:#888780;text-align:center;padding:16px 0}
.approved-row{background:#fff;border:0.5px solid #D6E4FF;border-radius:10px;padding:10px 13px;margin-bottom:6px;display:flex;align-items:center;gap:10px}
.school-check{display:flex;align-items:center;gap:5px;font-size:12px;color:#1A3566;cursor:pointer;padding:6px 10px;background:#fff;border:0.5px solid #D6E4FF;border-radius:6px}
.school-check input{margin:0}
.unit-card{background:#fff;border:0.5px solid #D6E4FF;border-radius:10px;padding:12px;margin-bottom:10px}
.unit-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.unit-title{font-size:13px;font-weight:600;color:#1A3566}
.unit-count{font-size:11px;color:#5A7BAD}
.passage-mini{background:#F8FAFE;border:0.5px solid #E6EEFC;border-radius:6px;padding:6px 9px;margin-bottom:4px;font-size:11px;color:#5A7BAD;display:flex;justify-content:space-between;align-items:center;gap:6px}
.school-row{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.school-btn{flex:1;min-width:90px;font-size:11px;padding:8px;border-radius:6px;border:0.5px solid #A8C4F5;background:#EBF2FF;color:#1A3566;cursor:pointer;text-align:center;font-weight:500}
.school-btn.done{background:#EAF3DE;border-color:#A8D472;color:#27500A}
.del-tiny{font-size:10px;color:#E24B4A;border:0.5px solid #E24B4A;background:transparent;border-radius:4px;padding:2px 6px;cursor:pointer;flex-shrink:0}
.gen-modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:9999;align-items:center;justify-content:center}
.gen-modal.show{display:flex}
.gen-modal-inner{background:#fff;border-radius:14px;padding:20px;width:88%;max-width:340px}
.gen-title-m{font-size:14px;font-weight:600;color:#1A3566;margin-bottom:6px}
.gen-sub-m{font-size:11px;color:#5A7BAD;margin-bottom:14px}
.gen-progress-bar{background:#F0F4FB;height:8px;border-radius:4px;overflow:hidden;margin-bottom:8px}
.gen-progress-fill{background:#2B5EB8;height:100%;transition:width 0.3s;width:0%}
.gen-log{background:#F8FAFE;border-radius:8px;padding:8px;max-height:160px;overflow-y:auto;font-size:11px;line-height:1.6;color:#2C2C2A;margin-bottom:10px}
.gen-log-item{margin-bottom:3px}
.gen-log-ok{color:#3B6D11}
.gen-log-err{color:#E24B4A}
.gen-close-btn{width:100%;background:#2B5EB8;color:#fff;border:none;border-radius:8px;padding:10px;font-size:13px;font-weight:500;cursor:pointer}
</style>

<div class="gen-modal" id="gen-modal">
  <div class="gen-modal-inner">
    <div class="gen-title-m" id="gen-title">문제 생성 중...</div>
    <div class="gen-sub-m" id="gen-sub">잠시만 기다려주세요</div>
    <div class="gen-progress-bar"><div class="gen-progress-fill" id="gen-progress-fill"></div></div>
    <div style="font-size:11px;color:#5A7BAD;margin-bottom:8px" id="gen-count">0 / 0</div>
    <div class="gen-log" id="gen-log"></div>
    <button class="gen-close-btn" id="gen-close-btn" onclick="closeGenModal()" style="display:none">닫기</button>
  </div>
</div>

<script type="module">
  import { auth, db } from './js/firebase.js';
  import { signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { collection, getDocs, doc, getDoc, setDoc, updateDoc, deleteDoc, query, where } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const COMMON_TYPES = ['내용일치_한국어', '내용일치_영어'];

  const SCHOOL_TYPES = {
    '매산고': ['흐름무관', '낱말쓰임', '글의제목', '글의순서', '요약빈칸', '문장삽입', '밑줄의미', '어법', '빈칸추론', '요지빈칸', '이유서술', '밑줄의미영작', ...COMMON_TYPES],
    '효천고': ['어법', '빈칸추론', '문장삽입', '글의순서', '낱말쓰임', '요약빈칸', '단어배열', ...COMMON_TYPES],
    '복성고': ['빈칸추론', '문장삽입', '낱말쓰임', '밑줄의미', '글의순서', '요약빈칸', '가정법영작', '접속사영작', ...COMMON_TYPES],
  };

  let CACHED_API_KEY = '';

  async function loadApiKey() {
    try {
      const s = await getDoc(doc(db, 'admin', 'config'));
      if (s.exists() && s.data().apiKey) { CACHED_API_KEY = s.data().apiKey; return CACHED_API_KEY; }
    } catch(e) {}
    return '';
  }

  window.toggleApiKeyView = () => {
    const inp = document.getElementById('api-key-input');
    inp.type = inp.type === 'password' ? 'text' : 'password';
  };

  window.saveApiKey = async () => {
    const key = document.getElementById('api-key-input').value.trim();
    const st  = document.getElementById('api-key-status');
    if (!key) { st.style.color='#E24B4A'; st.textContent='API 키를 입력해주세요.'; return; }
    if (!key.startsWith('sk-ant-')) { st.style.color='#E24B4A'; st.textContent='형식 오류'; return; }
    try {
      await setDoc(doc(db,'admin','config'), { apiKey:key, updatedAt:new Date().toISOString() }, { merge:true });
      CACHED_API_KEY = key;
      st.style.color='#3B6D11';
      st.textContent='✅ 저장 완료';
    } catch(e) { st.style.color='#E24B4A'; st.textContent='저장 실패: ' + e.message; }
  };

  window.deleteAllQuestions = async () => {
    if (!confirm('모든 문제를 삭제할까요?')) return;
    if (!confirm('정말로요?')) return;
    const snap = await getDocs(collection(db,'questions'));
    let n = 0;
    for (const d of snap.docs) { await deleteDoc(d.ref); n++; }
    alert(`${n}개 문제를 삭제했어요.`);
  };

  window.switchTab = async (tab) => {
    ['approve','passages','records','settings'].forEach(t => {
      document.getElementById('section-'+t).classList.add('hidden');
      document.getElementById('tab-'+t).classList.remove('on');
    });
    document.getElementById('section-'+tab).classList.remove('hidden');
    document.getElementById('tab-'+tab).classList.add('on');
    if (tab === 'records')  loadRecords();
    if (tab === 'settings') {
      const k = await loadApiKey();
      if (k) {
        document.getElementById('api-key-input').value = k;
        document.getElementById('api-key-status').style.color = '#3B6D11';
        document.getElementById('api-key-status').textContent = '✅ 저장된 키가 있어요';
      }
    }
  };

  window.adminLogin = async () => {
    const id  = document.getElementById('admin-id').value.trim();
    const pw  = document.getElementById('admin-pw').value.trim();
    const err = document.getElementById('admin-error');
    err.textContent = '';
    if (!id || !pw) { err.textContent = '입력해주세요.'; return; }
    try {
      const email = id.includes('@') ? id : id + '@haileyalla.com';
      const cred  = await signInWithEmailAndPassword(auth, email, pw);
      const snap  = await getDoc(doc(db, 'users', cred.user.uid));
      if (!snap.exists() || snap.data().role !== 'admin') {
        err.textContent = '관리자 계정이 아니에요.';
        await signOut(auth); return;
      }
      showAdminMain();
    } catch(e) { err.textContent = '로그인 실패'; }
  };

  window.adminLogout = async () => {
    await signOut(auth);
    document.getElementById('page-admin-login').classList.remove('hidden');
    document.getElementById('page-admin-main').classList.add('hidden');
  };

  async function showAdminMain() {
    document.getElementById('page-admin-login').classList.add('hidden');
    document.getElementById('page-admin-main').classList.remove('hidden');
    await loadApiKey();
    loadPendingUsers();
  }

  onAuthStateChanged(auth, async (user) => {
    if (user) {
      const snap = await getDoc(doc(db, 'users', user.uid));
      if (snap.exists() && snap.data().role === 'admin') showAdminMain();
    }
  });

  async function loadPendingUsers() {
    const pEl = document.getElementById('pending-list');
    const aEl = document.getElementById('approved-list');
    pEl.innerHTML = aEl.innerHTML = '';
    const snap = await getDocs(collection(db, 'users'));
    let pc = 0, ac = 0;
    snap.forEach(d => {
      const u = d.data();
      if (u.role === 'admin') return;
      if (!u.approved) {
        pc++;
        pEl.innerHTML += `<div class="pending-card">
          <div style="width:32px;height:32px;border-radius:50%;background:#FFF5E8;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;color:#854F0B;flex-shrink:0">${u.name?.[0]||'?'}</div>
          <div style="flex:1"><div style="font-size:13px;font-weight:500;color:#2C2C2A">${u.name||''}</div><div style="font-size:11px;color:#888780">${u.school||''} · ${u.grade||''} · ${u.userId||''}</div></div>
          <button class="approve-btn" onclick="approveUser('${d.id}','${u.name}')">승인</button>
          <button class="reject-btn"  onclick="rejectUser('${d.id}')">거절</button>
        </div>`;
      } else {
        ac++;
        aEl.innerHTML += `<div class="approved-row">
          <div style="width:32px;height:32px;border-radius:50%;background:#EAF3DE;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;color:#27500A;flex-shrink:0">${u.name?.[0]||'?'}</div>
          <div style="flex:1"><div style="font-size:13px;font-weight:500;color:#1A3566">${u.name||''}</div><div style="font-size:11px;color:#888780">${u.school||''} · ${u.grade||''} · ${u.userId||''}</div></div>
          <button class="reject-btn" onclick="revokeUser('${d.id}')">취소</button>
        </div>`;
      }
    });
    if (pc===0) pEl.innerHTML = '<div class="empty-msg">대기 중인 학생이 없어요</div>';
    if (ac===0) aEl.innerHTML = '<div class="empty-msg">승인된 학생이 없어요</div>';
  }

  window.approveUser = async (uid,name) => {
    await updateDoc(doc(db,'users',uid),{approved:true});
    alert(name+' 학생을 승인했어요!');
    loadPendingUsers();
  };
  window.rejectUser = async (uid) => {
    if (!confirm('정말 거절하시겠어요?')) return;
    await updateDoc(doc(db,'users',uid),{approved:false,rejected:true});
    loadPendingUsers();
  };
  window.revokeUser = async (uid) => {
    if (!confirm('승인을 취소하시겠어요?')) return;
    await updateDoc(doc(db,'users',uid),{approved:false});
    loadPendingUsers();
  };

  const unitOptions = {
    '교과서':    ['Lesson 1','Lesson 2','Lesson 3','Lesson 4','Lesson 5','Lesson 6'],
    '리딩마스터':['1강','2강','3강','4강','5강','6강','7강','8강','9강','10강','11강','12강','13강','14강','15강','16강'],
    '리뷰':      ['1회','2회','3회','4회','5회'],
    '모의고사':  ['3월 고2','6월 고2','9월 고2','11월 고2','3월 고1'],
  };

  window.updateUnitOptions = () => {
    const tb  = document.getElementById('p-textbook').value;
    const sel = document.getElementById('p-unit');
    sel.innerHTML = '<option value="">선택하세요</option>';
    (unitOptions[tb]||[]).forEach(u => sel.innerHTML += `<option value="${u}">${u}</option>`);
  };

  function splitPassages(text) {
    const lines = text.split('\n');
    const passages = [];
    let current = null;
    lines.forEach(line => {
      const t = line.trim();
      if (/^(\d{1,2})$/.test(t)) {
        if (current) passages.push(current);
        current = { num: t.padStart(2,'0'), text:'', footnote:'' };
      } else if (current) {
        if (t.startsWith('*')) current.footnote += t + '\n';
        else if (t) current.text += (current.text?' ':'') + t;
      }
    });
    if (current) passages.push(current);
    return passages;
  }

  window.previewPassages = () => {
    const text = document.getElementById('p-text').value.trim();
    const tb   = document.getElementById('p-textbook').value;
    const unit = document.getElementById('p-unit').value;
    const schools = Array.from(document.querySelectorAll('.p-school-cb:checked')).map(cb => cb.value);
    const err  = document.getElementById('p-error');
    const prev = document.getElementById('p-preview');
    err.textContent = '';
    if (!tb||!unit) { err.textContent='교재와 강을 선택해주세요.'; return; }
    if (schools.length === 0) { err.textContent='학교를 1개 이상 선택해주세요.'; return; }
    if (!text) { err.textContent='지문을 붙여넣어 주세요.'; return; }
    const passages = splitPassages(text);
    if (passages.length===0) { err.textContent='지문을 인식하지 못했어요.'; return; }
    prev.style.display = 'block';
    prev.innerHTML = `<b>${tb} ${unit} — 총 ${passages.length}개 지문 (학교: ${schools.join(', ')})</b><br><br>`
      + passages.map((p,i) => `${i+1}. [${p.num}] ${p.text.substring(0,50)}...`).join('<br>');
    document.getElementById('btn-save-passages').disabled = false;
  };

  window.savePassages = async () => {
    const text   = document.getElementById('p-text').value.trim();
    const tb     = document.getElementById('p-textbook').value;
    const unit   = document.getElementById('p-unit').value;
    const schools = Array.from(document.querySelectorAll('.p-school-cb:checked')).map(cb => cb.value);
    const err    = document.getElementById('p-error');
    const btn    = document.getElementById('btn-save-passages');
    btn.disabled = true; btn.textContent = '저장 중...';
    err.textContent = '';
    const passages = splitPassages(text);
    try {
      for (const p of passages) {
        const docId = `${tb}_${unit}_${p.num}`.replace(/[\s/]+/g,'_');
        await setDoc(doc(db,'passages',docId), {
          textbook: tb, unit, num: p.num, text: p.text,
          footnote: p.footnote.trim(),
          schools, range: tb+'_'+unit,
          createdAt: new Date().toISOString()
        }, { merge: true });

  window.loadUnitList = async () => {
    const tb = document.getElementById('filter-textbook').value;
    const el = document.getElementById('unit-list');
    if (!tb) { el.innerHTML = '<div class="empty-msg">교재를 선택하세요</div>'; return; }
    el.innerHTML = '<div class="empty-msg">불러오는 중...</div>';

    const snap = await getDocs(collection(db,'passages'));
    const units = {};
    snap.forEach(d => {
      const p = d.data();
      if (p.textbook !== tb) return;
      if (!units[p.unit]) units[p.unit] = [];
      units[p.unit].push({ id: d.id, ...p });
    });

    if (Object.keys(units).length === 0) {
      el.innerHTML = '<div class="empty-msg">저장된 지문이 없어요</div>';
      return;
    }

    const qSnap = await getDocs(collection(db,'questions'));
    const doneSet = new Set();
    qSnap.forEach(d => {
      const q = d.data();
      doneSet.add(`${q.textbook}_${q.unit}_${q.school}`);
    });

    const sortedUnits = Object.keys(units).sort((a,b) => (parseInt(a)||0) - (parseInt(b)||0));

    let html = '';
    sortedUnits.forEach(unit => {
      const passages = units[unit].sort((a,b) => a.num.localeCompare(b.num));
      const allSchools = new Set();
      passages.forEach(p => (p.schools||[]).forEach(s => allSchools.add(s)));
      const schoolList = Array.from(allSchools);

      html += `<div class="unit-card">
        <div class="unit-header">
          <div class="unit-title">${tb} ${unit}</div>
          <div class="unit-count">${passages.length}개 지문</div>
        </div>`;

      passages.forEach(p => {
        html += `<div class="passage-mini">
          <span>${p.num}번 · ${p.text.substring(0,30)}...</span>
          <button class="del-tiny" onclick="deletePassage('${p.id}')">삭제</button>
        </div>`;
      });

      if (schoolList.length === 0) {
        html += `<div style="font-size:11px;color:#888780;margin-top:8px">사용 학교가 지정되지 않았어요</div>`;
      } else {
        html += `<div class="school-row">`;
        schoolList.forEach(school => {
          const done = doneSet.has(`${tb}_${unit}_${school}`);
          const cls = done ? 'school-btn done' : 'school-btn';
          const label = done ? `${school} ✅` : `${school} 문제 생성`;
          html += `<button class="${cls}" onclick="generateUnitQuestions('${tb}','${unit}','${school}')">${label}</button>`;
        });
        html += `</div>`;
      }
      html += `</div>`;
    });
    el.innerHTML = html;
  };

  window.deletePassage = async (id) => {
    if (!confirm('이 지문을 삭제하시겠어요? (관련 문제도 함께 삭제됩니다)')) return;
    await deleteDoc(doc(db,'passages',id));
    const qSnap = await getDocs(collection(db,'questions'));
    for (const d of qSnap.docs) {
      if (d.id.startsWith(id + '_')) await deleteDoc(d.ref);
    }
    loadUnitList();
  };

    const m = document.getElementById('gen-modal');
    document.getElementById('gen-title').textContent = title;
    document.getElementById('gen-sub').textContent = '잠시만 기다려주세요';
    document.getElementById('gen-progress-fill').style.width = '0%';
    document.getElementById('gen-count').textContent = '0 / 0';
    document.getElementById('gen-log').innerHTML = '';
    document.getElementById('gen-close-btn').style.display = 'none';
    m.classList.add('show');
  }
  function updateGenProgress(cur, total) {
    document.getElementById('gen-count').textContent = `${cur} / ${total}`;
    document.getElementById('gen-progress-fill').style.width = `${(cur/total)*100}%`;
  }
  function logGen(msg, type='') {
    const el = document.getElementById('gen-log');
    const cls = type === 'ok' ? 'gen-log-ok' : (type === 'err' ? 'gen-log-err' : '');
    el.innerHTML += `<div class="gen-log-item ${cls}">${msg}</div>`;
    el.scrollTop = el.scrollHeight;
  }
  window.closeGenModal = () => {

  window.generateUnitQuestions = async (textbook, unit, school) => {
    const apiKey = CACHED_API_KEY || await loadApiKey();
    if (!apiKey) { alert('먼저 [설정] 탭에서 Claude API 키를 저장해주세요.'); return; }

    const types = SCHOOL_TYPES[school];
    if (!types) { alert('이 학교의 유형이 정의되지 않았어요.'); return; }

    const snap = await getDocs(collection(db,'passages'));
    const passages = [];
    snap.forEach(d => {
      const p = d.data();
      if (p.textbook === textbook && p.unit === unit && (p.schools||[]).includes(school)) {
        passages.push({ id: d.id, ...p });
      }
    });
    passages.sort((a,b) => a.num.localeCompare(b.num));

    if (passages.length === 0) { alert(`${school}용 지문이 없어요.`); return; }

    if (!confirm(`${textbook} ${unit} · ${school} 문제 생성\n\n지문 ${passages.length}개 × 유형 ${types.length}개 × 2문제 = 총 ${passages.length * types.length * 2}문제\n예상 시간: 약 ${Math.ceil(passages.length * types.length * 0.1)}분\n\n진행할까요?`)) return;

    openGenModal(`${school} · ${textbook} ${unit} 문제 생성`);

    const total = passages.length * types.length;
    let done = 0, success = 0, failed = 0;

    for (const p of passages) {
      for (const t of types) {
        try {
          logGen(`${p.num}번 · ${t} 생성 중...`);
          const result = await generateForType(apiKey, p, t, school);

          for (let i = 0; i < result.questions.length; i++) {
            const q = result.questions[i];
            const docId = `${p.id}_${school}_${t}_${i+1}`.replace(/[\s/]+/g,'_');
            await setDoc(doc(db,'questions',docId), {
              passageId: p.id,
              textbook, unit,
              num: p.num, school, typeName: t,
              idx: i+1,
              ...q,
              createdAt: new Date().toISOString()
            });
          }
          success++;
          logGen(`${p.num}번 · ${t} ✅`, 'ok');
        } catch(e) {
          failed++;
          logGen(`${p.num}번 · ${t} ❌ ${e.message.substring(0,60)}`, 'err');
        }
        done++;
        updateGenProgress(done, total);
      }
    }

    document.getElementById('gen-title').textContent = '✅ 생성 완료';
    document.getElementById('gen-sub').textContent = `성공 ${success}개 · 실패 ${failed}개`;
    document.getElementById('gen-close-btn').style.display = 'block';
  };

  async function generateForType(apiKey, passage, type, school) {
    const prompt = getPrompt(type, passage, school);

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-5',
        max_tokens: 4000,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    if (!res.ok) {
      const err = await res.text();
      throw new Error(`API ${res.status}: ${err.substring(0,80)}`);
    }

    const data = await res.json();
    let txt = data.content[0].text.trim();
    txt = txt.replace(/^```json\s*/i,'').replace(/^```\s*/,'').replace(/```\s*$/,'').trim();

    let parsed;
    try {
      parsed = JSON.parse(txt);
    } catch(e) {
      const match = txt.match(/\{[\s\S]*\}/);
      if (match) parsed = JSON.parse(match[0]);
      else throw new Error('JSON 파싱 실패');
    }

    if (!parsed.questions || parsed.questions.length < 2) {
      throw new Error('문제 2개 미만');
    }

    return parsed;
  }

  async function loadRecords() {
    const listEl = document.getElementById('records-list');
    listEl.innerHTML = '<div class="empty-msg">불러오는 중...</div>';
    const snap = await getDocs(collection(db,'users'));
    let html='', count=0;
    snap.forEach(d => {
      const u = d.data();
      if (u.role==='admin'||!u.approved) return;
      count++;
      html += buildStudentCard(d.id,u);
    });
    listEl.innerHTML = count===0 ? '<div class="empty-msg">기록이 없어요</div>' : html;
  }

  function buildStudentCard(uid,u) {
    return `<div class="student-card">
      <div class="student-header" onclick="toggleStudent('${uid}','${u.name}','${u.userId}','${u.school}')">
        <div style="width:32px;height:32px;border-radius:50%;background:#EBF2FF;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;color:#1A3566;flex-shrink:0">${u.name?.[0]||'?'}</div>
        <div class="s-info">
          <div style="font-size:13px;font-weight:500;color:#1A3566">${u.name||''} <span style="font-size:10px;color:#5A7BAD">${u.userId||''}</span></div>
          <div style="font-size:11px;color:#5A7BAD;margin-top:1px">${u.school||''} · ${u.grade||''}</div>
        </div>
        <span style="font-size:14px;color:#A8C4F5" id="arr-${uid}">▼</span>
      </div>
      <div class="week-body" id="wb-${uid}">
        <div id="rec-${uid}"><div class="empty-msg">불러오는 중...</div></div>
        <div id="toast-${uid}" class="copy-toast">카톡 복사 완료!</div>
        <button class="kakao-btn" onclick="copyKakao('${uid}','${u.name}','${u.userId}','${u.school}')">카톡으로 복사</button>
      </div>
    </div>`;
  }

  window.toggleStudent = async (uid) => {
    const wb  = document.getElementById('wb-'+uid);
    const arr = document.getElementById('arr-'+uid);
    const isOpen = wb.classList.contains('open');
    wb.classList.toggle('open',!isOpen);
    arr.textContent = isOpen ? '▼' : '▲';
    if (!isOpen) await loadStudentRecords(uid);
  };

  async function loadStudentRecords(uid) {
    const recEl   = document.getElementById('rec-'+uid);
    const weekAgo = new Date();
    weekAgo.setDate(weekAgo.getDate()-7);
    try {
      const snap = await getDocs(query(collection(db,'progress'),
        where('userId','==',uid),
        where('date','>=',weekAgo.toISOString().split('T')[0])
      ));
      if (snap.empty) { recEl.innerHTML='<div class="empty-msg">이번 주 학습 기록이 없어요</div>'; return; }
      const byDate = {};
      snap.forEach(d => {
        const data = d.data();
        if (!byDate[data.date]) byDate[data.date]=[];
        byDate[data.date].push(data);
      });
      let html='';
      Object.keys(byDate).sort().reverse().forEach(date => {
        const items  = byDate[date];
        html += `<div class="day-row" style="margin-bottom:8px">
          <div style="font-size:10px;color:#888780;margin-bottom:4px;display:flex;justify-content:space-between">
            <span>${formatDate(date)}</span><span style="color:#3B6D11">${items.length}건</span>
          </div>
          <div style="display:flex;flex-wrap:wrap;gap:4px">`;
        items.forEach(item => {
          const cls = (item.correctCount === 2 || item.correct) ? 'di-correct' : 'di-wrong';
          html += `<span class="day-item ${cls}" style="font-size:10px;padding:3px 7px;border-radius:6px;font-weight:500">${item.typeName} ${item.round}회 ${item.correctCount ?? (item.correct?2:0)}/2</span>`;
        });
        html += `</div></div>`;
      });
      recEl.innerHTML = html;
    } catch(e) { recEl.innerHTML='<div class="empty-msg">기록을 불러올 수 없어요</div>'; }
  }

  function formatDate(dateStr) {
    const d=new Date(dateStr);
    const days=['일','월','화','수','목','금','토'];
    return `${d.getMonth()+1}/${d.getDate()} (${days[d.getDay()]})`;
  }

  window.copyKakao = async (uid,name,userId,school) => {
    const recEl = document.getElementById('rec-'+uid);
    const rows  = recEl.querySelectorAll('.day-row');
    let text = `[헤일리올라 영어학원]\n━━━━━━━━━━━━━━\n학생: ${name} (${userId})\n학교: ${school}\n━━━━━━━━━━━━━━\n이번주 학습 기록\n\n`;
    if (rows.length===0) text += '이번 주 학습 기록 없음\n';
    else rows.forEach(row => {
      const label = row.querySelector('span:first-child').textContent;
      const items = row.querySelectorAll('.day-item');
      text += `${label}\n`;
      items.forEach(item => text += `${item.classList.contains('di-correct')?'✅':'❌'} ${item.textContent}\n`);
      text += '\n';
    });
    text += `━━━━━━━━━━━━━━\n헤일리올라영어학원`;
    await navigator.clipboard.writeText(text);
    const toast = document.getElementById('toast-'+uid);
    toast.classList.add('show');
    setTimeout(()=>toast.classList.remove('show'),2000);
  };
